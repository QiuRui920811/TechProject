      G: GLASS
      W: tech:copper_wire
      M: IRON_BLOCK
      R: REDSTONE_BLOCK
    tutorial:
      - 電解分離機利用電流將化合物分解為基本元素。
      - 需要先解鎖工業離心機，才能建造電解分離機。
      - 輸入水桶和紅石，可產出氫、氧、硒粉和矽。
      - 硒粉是太陽能板的關鍵材料。
    placement:
      - 建議放置在離心機產線後方，進一步精煉材料。
      - 此機器每 tick 消耗 25 電力，是高耗能設備。
  hazmat_helmet:
