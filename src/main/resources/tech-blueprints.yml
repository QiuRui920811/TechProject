      D: tech:data_core
      N: tech:nano_coating
      E: CHISELED_BOOKSHELF
      G: tech:gravitic_bearing
    tutorial:
      - 資料封存庫承接觀測站的數據核心與重力軸承，將它們壓縮封存為檔案板。
      - 檔案板是終局科技線（巨構系列）的核心前置材料，早點穩定產量非常關鍵。
      - 若進度卡在資料封存庫，通常表示觀測站的數據核心供應不足，先回頭補強。
    placement:
      - 建議放在觀測站旁邊，形成觀測資料 → 封存資料 → 終局科技的完整產線。
      - 產出的檔案板接獨立倉儲，避免跟一般中間件混線。
  anchor_forge:
    shape:
      - "WGW"
      - "SMS"
      - "WCW"
    ingredients:
