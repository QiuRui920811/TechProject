      S: tech:steel_plate
      K: CAULDRON
      C: COPPER_INGOT
      P: PISTON
    tutorial:
      - 先準備冰磚、鋼板、鍋釜、銅錠與活塞。
      - 先在地上放鐵方塊，再把工作台放在上方形成進階工作台。
      - 用進階工作台照配方擺出冷卻混合器。
      - 放下後右鍵開啟介面，可將冷卻元件與水凝膠混合為冷卻液。
    placement:
      - 建議放在需要冷卻的高耗能設備附近。
      - 產出的冷卻液是中後期機器的重要原料。
  android_bay:
    shape:
      - "SAS"
      - "CMC"
      - "SRS"
    ingredients:
      S: tech:steel_plate
      A: tech:android_core
      C: tech:control_unit
      M: tech:machine_casing
      R: REDSTONE
    tutorial:
      - 安卓艙是安卓自動化體系的起點，負責將安卓核心與外殼裝配成可部署的安卓元件。
      - 產出安卓外殼、安卓框架與安卓記憶矩陣，這些都是建造安卓工作站的關鍵前置。
      - 若想推安卓自動化農場或伐木，先把這台穩定運轉再說。
    placement:
      - 建議放在進階製造機旁邊，方便安卓框架直接流入安卓工作站的配方線。
      - 後續會需要大量安卓核心與機械外殼，提前備料很重要。
  data_archive:
    shape:
      - "QDQ"
      - "NEN"
      - "QGQ"
    ingredients:
