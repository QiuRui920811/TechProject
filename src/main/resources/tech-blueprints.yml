      P: tech:iron_plate
      S: tech:machine_component
      M: IRON_BLOCK
    tutorial:
      - 工業離心機透過高速旋轉分離礦物成分。
      - 需要先解鎖工業水洗機，才能使用離心機。
      - 主要用於從純化鐵粉和鈾礦粉中提取稀有元素。
      - 可產出鉻粉、鈷粉、濃縮鈾等高階材料。
    placement:
      - 建議放置在工業水洗機旁，形成完整的礦物處理產線。
      - 此機器每 tick 消耗 20 電力，確保電力充足。
  electrolytic_separator:
    shape:
