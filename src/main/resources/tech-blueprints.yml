blueprints:
  tech_wrench:
    shape:
      - "_ P"
      - "_CP"
      - "I__"
    ingredients:
      I: IRON_INGOT
      C: COPPER_INGOT
      P: tech:iron_plate
    tutorial:
      - 準備 1 個鐵錠、1 個銅錠與 1 個鐵板。
      - 先在地上放鐵方塊，再把工作台放在上方形成進階工作台。
      - 用進階工作台照配方擺出科技扳手。
      - 左鍵對準機器：開關機省電。
      - 蹲下+右鍵對準機器：瞬間拆除並保留儲存能源。
      - 不用的機器記得關機，省電很重要！
    placement:
      - 這是手持工具，不需要放置。
      - 建議隨身攜帶，隨時管理機器電力。
  gold_pan:
    shape:
      - "___"
      - "IBI"
      - "_I_"
    ingredients:
      I: IRON_INGOT
      B: BOWL
    tutorial:
      - 準備 4 個鐵錠與 1 個碗。
      - 先在地上放鐵方塊，再把工作台放在上方形成進階工作台。
      - 用進階工作台照配方擺出淘金盤。
      - 手持淘金盤對準礫石或靈魂沙右鍵即可篩礦。
      - 礫石可篩出鐵粉、銅粉、錫粉、鋅粉。
      - 靈魂沙可篩出鉛粉、金粒、石英。
      - 前期收集合金材料的最重要工具！
    placement:
      - 這是手持工具，不需要放置。
      - 建議在基地附近堆一大堆礫石和靈魂沙慢慢篩。
  research_desk:
    shape:
      - "BLB"
      - "CRC"
      - "III"
    ingredients:
      B: BOOK
      L: LECTERN
      C: COPPER_INGOT
      R: REDSTONE
      I: IRON_INGOT
    tutorial:
      - 先準備講台、書、銅錠、鐵錠與紅石。
      - 先在地上放鐵方塊，再把工作台放在上方形成進階工作台。
      - 用進階工作台照配方擺出研究台。
      - 放下後右鍵即可進入真正的研究台介面。
      - 前期先研究機器本體，中後期再用它點亮更多科技。
    placement:
      - 建議放在主基地或工廠中控區，方便隨時研究。
      - 這台本身不加工，只負責開啟研究台與查看研究狀態。
  solar_generator:
    shape:
      - "GGG"
      - "CRC"
      - "III"
    ingredients:
      G: GLASS
      C: COPPER_INGOT
      R: REDSTONE
      I: IRON_INGOT
    tutorial:
      - 先用原版熔爐把沙子燒成玻璃。
      - 去挖銅礦與鐵礦，原版熔煉成錠。
      - 先在地上放鐵方塊，再把工作台放在上方形成進階工作台。
      - 用進階工作台照配方擺出太陽能發電機。
      - 合成後放在露天，有天空才會穩定發電。
    placement:
      - 盡量放在戶外，不要被方塊遮住上方天空。
      - 初期建議直接放在粉碎機旁邊。
      - 右鍵可看內部資訊與方向。
  coal_generator:
    shape:
      - "III"
      - "CFC"
      - "IRI"
    ingredients:
      I: IRON_INGOT
      C: COAL
      F: FURNACE
      R: REDSTONE
    tutorial:
      - 先用圓石合成原版熔爐。
      - 挖煤、鐵礦，鐵礦熔成鐵錠。
      - 先在地上放鐵方塊，再把工作台放在上方形成進階工作台。
      - 用進階工作台照配方擺出燃煤發電機。
      - 放入煤或煤粉後就能供電。
    placement:
      - 最好放在粉碎機或熔爐旁邊。
      - 這台要消耗煤，記得持續補燃料。
      - 可和太陽能發電機一起用，白天夜晚都能供電。
  crusher:
    shape:
      - "CCC"
      - "IRI"
      - "NPN"
    ingredients:
      C: COBBLESTONE
      I: IRON_INGOT
      R: REDSTONE
      N: IRON_BLOCK
      P: PISTON
    tutorial:
      - 先挖圓石、鐵礦、紅石。
      - 先用原版方式做出活塞。
      - 先在地上放鐵方塊，再把工作台放在上方形成進階工作台。
      - 用進階工作台照配方合成粉碧機。
      - 第一個要丟進去的通常是鐵礦、銅礦、煤、石英。
    placement:
      - 初期直接放在太陽能發電機或燃煤發電機旁邊。
      - 上排放原料，等它輸出粉末。
      - 輸出區要留空，不然不會繼續加工。
  furnace:
    shape:
      - "III"
      - "RGR"
      - "CCC"
    ingredients:
      I: IRON_INGOT
      R: REDSTONE
      G: GLASS
      C: COBBLESTONE
    tutorial:
      - 這裡做的是科技用熔爐，不是原版熔爐本體。
      - 先用原版熔爐把沙子燒成玻璃，並準備鐵錠與紅石。
      - 先在地上放鐵方塊，再把工作台放在上方形成進階工作台。
      - 用進階工作台照配方擺出科技熔爐。
      - 做好後就能把鐵粉、銅粉加工回金屬錠。
    placement:
      - 建議直接接在粉碎機後面，形成前期基礎加工線。
      - 上排放粉末原料，等右側輸出成品。
      - 開著介面時目前會暫停加工，關閉後恢復運作。
  compressor:
    shape:
      - "NPN"
      - "RPR"
      - "ICI"
    ingredients:
      N: IRON_BLOCK
      P: PISTON
      R: REDSTONE
      I: IRON_INGOT
      C: COPPER_INGOT
    tutorial:
      - 準備鐵方塊×2、活塞×2、鐵錠×2、紅石×2、銅錠×1。
      - 先在地上放鐵方塊，再把工作台放在上方形成進階工作台。
      - 用進階工作台照配方擺出壓縮機。
      - 壓縮機可以把鐵板壓成鋼板、壓實鐵胚、碳纖網等進階材料。
      - 這是製作鋼板的唯一方法，也是邁入中階科技的關鍵機器。
    placement:
      - 放在發電機旁邊，確保有穩定供電。
      - 建議和粉碎機、熔爐形成前期加工流水線。
      - 上排放入鐵板等原料，等輸出區出現成品。
  assembler:
    shape:
      - "SCS"
      - "GBG"
      - "IPI"
    ingredients:
      S: tech:steel_plate
      C: COPPER_INGOT
      G: tech:bronze_ingot
      B: CRAFTER
      I: IRON_INGOT
      P: PISTON
    tutorial:
      - 先用壓縮機把鐵板壓成鋼板。
      - 準備原版合成器（不是工作台！需要鐵錠+紅石+工作台+投擲器合成）、活塞、銅錠與鐵錠。
      - 用合金熔煉爐做出青銅錠（銅粉+錘粉）。
      - 先在地上放鐵方塊，再把工作台放在上方形成進階工作台。
      - 用進階工作台照配方擺出製造機，中央放合成器。
      - 製造機能做出電路板、邏輯閘、機械零件等中階材料。
    placement:
      - 放在壓縮機旁邊，形成中階加工線。
      - 確保有穩定供電，建議用太陽能陣列或燃煤發電機。
  advanced_assembler:
    shape:
      - "ACA"
      - "NMN"
      - "APA"
    ingredients:
      A: tech:advanced_circuit
      C: tech:circuit_board
      N: tech:composite_panel
      M: LOOM
      P: tech:precision_frame
    tutorial:
      - 先用製造機做好高階電路與精密框架。
      - 用壓縮機做出複合面板（鋼板+塑膠）。
      - 先在地上放鐵方塊，再把工作台放在上方形成進階工作台。
      - 用進階工作台照配方擺出進階製造機。
      - 進階製造機能做出奈米塗層、反應堆核心等高階材料。
    placement:
      - 放在製造機旁邊延伸產線。
      - 這台是通往 TIER3 科技的關鍵閘門。
  smeltery:
    shape:
      - "NIN"
      - "IMI"
      - "CIC"
    ingredients:
      N: NETHER_BRICKS
      I: IRON_INGOT
      M: MAGMA_BLOCK
      C: tech:bronze_ingot
    tutorial:
      - 先用淘金盤篩礫石取得錫粉，再搭配銅粉用熔爐取得青銅錠。
      - 準備地獄磚、鐵錠與岩漿塊。
      - 先在地上放鐵方塊，再把工作台放在上方形成進階工作台。
      - 用進階工作台照配方擺出合金熔煉爐。
      - 合金熔煉爐可以把鐵粉+煤粉做成鈦合金，也可熔煉青銅、焊錫、黃銅。
    placement:
      - 放在熔爐旁邊，延伸金屬加工線。
      - 吃電量偏高，建議用好的發電機。
  laser_engraver:
    shape:
      - "OGO"
      - "SES"
      - "APA"
    ingredients:
      O: tech:optic_lens
      G: tech:reinforced_glass
      S: tech:silicon
      E: END_ROD
      A: tech:advanced_circuit
      P: tech:precision_frame
    tutorial:
      - 先用熔爐做好光學鏡片（玻璃板 + 矽晶）與強化玻璃（玻璃板 + 碳纖網）。
      - 確保有進階電路與精密框架（製造機產出）。
      - 先在地上放鐵方塊，再把工作台放在上方形成進階工作台。
      - 用進階工作台照配方擺出雷射雕刻機，中央放末地燭。
      - 雷射雕刻機能做出雷射鏡、蝕刻電路與控制單元。
    placement:
      - 放在製造機與進階製造機旁邊。
      - 蝕刻電路與控制單元是建造量子處理器的前置材料。
  quantum_processor:
    shape:
      - "NAN"
      - "CMC"
      - "NEN"
    ingredients:
      N: tech:nano_coating
      A: tech:advanced_circuit
      C: tech:control_unit
      M: RESPAWN_ANCHOR
      E: tech:etched_circuit
    tutorial:
      - 先用進階製造機做好奈米塗層。
      - 用雷射雕刻機做蝕刻電路與控制單元。
      - 先在地上放鐵方塊，再把工作台放在上方形成進階工作台。
      - 用進階工作台照配方擺出量子處理器。
      - 量子處理器能做出量子晶片、場發射器等頂級材料。
    placement:
      - 放在進階製造機與雷射雕刻機旁邊。
      - 這台是通往 TIER4 科技與終局內容的關鍵閘門。
  fusion_reactor:
    shape:
      - "QFQ"
      - "RMR"
      - "QFQ"
    ingredients:
      Q: tech:quantum_chip
      F: tech:field_plate
      R: tech:reactor_core
      M: CRYING_OBSIDIAN
    tutorial:
      - 先用量子處理器做好量子晶片。
      - 用場鍛爐做出場板。
      - 用進階製造機做出反應堆核心。
      - 先在地上放鐵方塊，再把工作台放在上方形成進階工作台。
      - 用進階工作台照配方擺出聚變反應爐。
      - 聚變反應爐是終局科技的核心入口。
    placement:
      - 建議獨立區域放置，確保高供電量。
      - 這台是通往暗物質、反物質、虛空等終局科技線的唯一入口。
  electric_saw:
    shape:
      - "ISI"
      - "CRC"
      - "III"
    ingredients:
      I: IRON_INGOT
      S: STONECUTTER
      C: COPPER_INGOT
      R: REDSTONE
    tutorial:
      - 先用原版方式做出切石機。
      - 挖銅礦與鐵礦，熔成錠後再合成。
      - 木頭先做成橡木材板，再放進機器。
      - 它會把木材轉成木屑。
    placement:
      - 放在發電機旁邊即可使用。
      - 非常適合開局接木材線與回收線。
  recycler:
    shape:
      - "IRI"
      - "HBH"
      - "III"
    ingredients:
      I: IRON_INGOT
      R: REDSTONE
      H: HOPPER
      B: BARREL
    tutorial:
      - 先做木桶與漏斗。
      - 再挖鐵與紅石做出回收機。
      - 可把回收料與木屑轉成可再利用材料。
      - 中期塑膠線會很常用到它。
    placement:
      - 初期可和電鋸放同一區。
      - 建議旁邊放發電機，避免回收線卡住。
  auto_farm:
    shape:
      - "III"
      - "HWH"
      - "IRI"
    ingredients:
      I: IRON_INGOT
      H: HAY_BLOCK
      W: WHEAT_SEEDS
      R: REDSTONE
    tutorial:
      - 先打草取得小麥種子。
      - 再用小麥做出乾草捆。
      - 先在地上放鐵方塊，再把工作台放在上方形成進階工作台。
      - 用進階工作台照配方合成自動農場。
      - 放入種子後可穩定產出作物材料，也能進一步做出大豆種子。
    placement:
      - 旁邊最好先有發電機。
      - 後面可以接溫室培育艙、生質實驗室、作物收割機。
      - 先把大豆種子種成田，再用收割機或收田鐮刀擴大量產。
  battery_bank:
    shape:
      - "CRC"
      - "RLR"
      - "CIC"
    ingredients:
      C: COPPER_INGOT
      R: REDSTONE
      L: REDSTONE_LAMP
      I: IRON_INGOT
    tutorial:
      - 先把太陽能發電機與燃煤發電機跑穩。
      - 再用原版材料做出電池庫當緩衝電池。
      - 這台適合放在發電區與加工區之間。
    placement:
      - 前面接發電機，後面接粉碎機、溫室培育艙或其他耗能機。
      - 白天與夜晚電力波動大時，這台會很有感。
  greenhouse:
    shape:
      - "GGG"
      - "LSL"
      - "III"
    ingredients:
      G: GLASS
      L: MANGROVE_LEAVES
      S: WHEAT_SEEDS
      I: IRON_INGOT
    tutorial:
      - 先完成自動農場，確保你有種子與基礎糧線。
      - 用玻璃、樹葉、鐵錠做出溫室培育艙。
      - 放好後就能把農業材料往生長燈、水凝膠推進。
      - 之後可再做香辛莓種子、茶葉苗種與水培鏟。
    placement:
      - 最好貼著農地或自動農場區。
      - 記得旁邊先有穩定供電。
  energy_node:
    shape:
      - "CRC"
      - "RLR"
      - "CRC"
    ingredients:
      C: COPPER_INGOT
      R: REDSTONE
      L: LIGHTNING_ROD
    tutorial:
      - 當發電區與工廠不在一起時，就做能源節點。
      - 它是遠距離電力骨幹，不是單台發電機。
      - 建議至少成對設置，方便跨區接線。
    placement:
      - 放在主幹道或轉角點最實用。
      - 傳不到電時先檢查方向與節點距離。
  energy_cable:
    shape:
      - "IRI"
      - "ICI"
      - "IRI"
    ingredients:
      I: IRON_INGOT
      R: REDSTONE
      C: COPPER_INGOT
    tutorial:
      - 導能線纜適合補足節點之間的短距離接線。
      - 用鐵、銅、紅石就能先把基礎主幹搭起來。
    placement:
      - 走廊式延伸最容易整理。
      - 建議和物流管線分層，除錯會更簡單。
  logistics_node:
    shape:
      - "IRI"
      - "HTH"
      - "IRI"
    ingredients:
      I: IRON_INGOT
      R: REDSTONE
      H: HOPPER
      T: TARGET
    tutorial:
      - 有了多條產線後，就該做物流節點。
      - 這台幫你把遠距物流幹線拉開，不必全部貼在一起。
    placement:
      - 放在產線交會口與跨區入口。
      - 記得搭配正確輸入 / 輸出方向。
  item_tube:
    shape:
      - "GGG"
      - "IRI"
      - "GGG"
    ingredients:
      G: GLASS_PANE
      I: IRON_INGOT
      R: REDSTONE
    tutorial:
      - 當物流不想只靠相鄰六面時，就補物流導管。
      - 玻璃板、鐵、紅石即可先做出基本物流導管。
    placement:
      - 很適合走天花板或地板下方。
      - 與物流節點搭配時，長線會穩很多。
  crop_harvester:
    register-recipe: false
    ingredient-lines:
      - 製作站：製造機
      - 主材料：收割矩陣 + 農業模組
    tutorial:
      - 先把自動農場穩定化，再做收割矩陣。
      - 用製造機合成後，就能升級成真正的自動收成線。
      - 很適合搭配大豆、香辛莓、茶葉這類手種科技作物。
    placement:
      - 要和農田同高度，周圍最好已有成熟作物。
      - 旁邊可以接真空入口或倉儲匯流站。
      - 若前期還沒做機器，可先用收田鐮刀手動跑 3x3 收成。
  vacuum_inlet:
    register-recipe: false
    ingredient-lines:
      - 製作站：製造機
      - 主材料：真空核心 + 機器外殼
    tutorial:
      - 先做好真空核心，再進製造機做本體。
      - 適合把掉落物集中吸回產線，減少地面卡料。
    placement:
      - 放在作物收割機、伐木機、生物收集器的掉落中心。
      - 預設會略過太新的掉落物，避免剛丟下就被吸走。
  storm_turbine:
    register-recipe: false
    ingredient-lines:
      - 製作站：進階製造機
      - 主材料：風暴轉子 + 天候感測器
    tutorial:
      - 先補好拉線機與感測支線，再做風暴發電。
      - 這台在下雨、打雷時特別強。
    placement:
      - 需要露天，最好單獨架高。
      - 後面建議接電池庫做峰值儲能。
  tree_feller:
    register-recipe: false
    ingredient-lines:
      - 製作站：製造機
      - 主材料：伐木刀組 + 林業機架
    tutorial:
      - 先讓電鋸穩定供木材線。
      - 做好伐木刀組與林業機架後，再組出伐木機。
    placement:
      - 靠近自然樹列底部放置最穩。
      - 預設只會處理看起來像自然樹的結構。
  fishing_dock:
    register-recipe: false
    ingredient-lines:
      - 製作站：製造機
      - 主材料：誘餌模組 + 釣台骨架
    tutorial:
      - 先從生質實驗室做出誘餌模組，再做水域支線。
      - 這台能把水域穩定變成被動漁獲來源。
    placement:
      - 至少保留 3 格相鄰水面。
      - 可接真空入口或倉儲匯流站做自動收納。
  mob_collector:
    register-recipe: false
    ingredient-lines:
      - 製作站：進階製造機
      - 主材料：捕網發射器 + 場域處理器
    tutorial:
      - 先完成控制器與高級裝配線。
      - 這台適合刷怪塔或自動畜牧場後段回收。
    placement:
      - 不會處理命名、馴服、拴繩或幼年生物。
      - 最好放在掉落物可集中收集的位置。
  quarry_drill:
    register-recipe: false
    ingredient-lines:
      - 製作站：進階製造機
      - 主材料：鑽頭組 + 採礦機架
    tutorial:
      - 先把鋼板、鈦合金、機械零件產線補齊。
      - 做出鑽頭與機架後，再合成採礦鑽機本體。
      - 鑽頭組與採礦機架只是合成材料，不是運轉時要塞進去的耗材。
      - 採礦鑽機改成高爐核心結構，現場搭好後再用右鍵啟動。
    placement:
      - 中心放原版高爐，上方放箱子；高爐同一軸兩側放鐵方塊，鐵方塊上方各放一台採礦鑽機。
      - 燃料直接放上方箱子，右鍵中央高爐切換啟動；Shift + 右鍵中央高爐才會打開設定介面。
      - 會掃描自己所在區塊往下所有礦物，不吃東南西北方向。
  quarry_drill_mk2:
    register-recipe: false
    ingredient-lines:
      - 製作站：進階製造機
      - 主材料：採礦鑽機 + 電容組 + 控制單元
    tutorial:
      - 先把採礦鑽機一型跑穩，再補電容組與控制單元。
      - 二型結構跟一型一樣，但每輪耗電更高、抽礦次數更多。
    placement:
      - 結構與一型相同：中心原版高爐、上方箱子、同一軸雙鐵方塊、雙採礦鑽機。
      - 建議先接電池庫與能源節點，不然箱子有燃料也會因缺電停住。
  quarry_drill_mk3:
    register-recipe: false
    ingredient-lines:
      - 製作站：量子處理器
      - 主材料：採礦鑽機二型 + 聚變核心 + 量子框架
    tutorial:
      - 三型是終局礦機，請先完成聚變與量子框架線。
      - 這台會直接掃完整個所在區塊到最底層，效率最高，也最吃電與倉儲。
    placement:
      - 結構仍與一型相同，但務必準備大型箱子與總線物流。
      - 最好配合能源節點、倉儲匯流站、工業總線一起使用。
  storage_hub:
    register-recipe: false
    ingredient-lines:
      - 製作站：製造機
      - 主材料：儲存箱模組 + 機器外殼
    tutorial:
      - 多條線交會時，先做一台倉儲匯流站當緩衝。
      - 它能讓中間件先堆住，再繼續往外分流。
    placement:
      - 放在主產線中央或回收總入口。
      - 後面可接過濾路由器、分流節點、工業總線。
  filter_router:
    register-recipe: false
    ingredient-lines:
      - 製作站：進階製造機
      - 主材料：過濾核心 + 路由晶片
    tutorial:
      - 當你已經有複數中間件混在一起時，就該做過濾路由器。
      - 它能把單一種類穩定拆去指定支線。
    placement:
      - 第 1 格放樣本物品當模板。
      - 樣本格只放 1 個，避免被整批送走。
  splitter_node:
    register-recipe: false
    ingredient-lines:
      - 製作站：製造機
      - 主材料：分流核心 + 路由晶片
    tutorial:
      - 單一輸出要平均分給多條線時就用這台。
      - 很適合把主冶煉產物分到裝配、倉儲、回收三區。
    placement:
      - 放在主幹出口附近。
      - 後方支線越平均，整體越不容易塞住。
  industrial_bus:
    register-recipe: false
    ingredient-lines:
      - 製作站：進階製造機
      - 主材料：總線框架 + 儲存箱模組
    tutorial:
      - 當你工廠跨了好幾區，就該升級成工業總線。
      - 這是高吞吐主幹，不是一般相鄰輸送帶。
    placement:
      - 前後各保留足夠支線空間。
      - 最適合放在跨區大通道中央。
  kiln:
    shape:
      - "BCB"
      - "IKI"
      - "IRI"
    ingredients:
      B: BRICK
      C: CLAY_BALL
      K: BRICKS
      I: IRON_INGOT
      R: REDSTONE
    tutorial:
      - 這台是擴充加工線的第一個門檻，先把熔爐、拉線與鋼板穩定下來。
      - 先燒出陶瓷板，再進一步推成熱穩陶瓷，後面低溫與高熱設備都會反覆用到。
      - 若你還在缺熱線圈，表示前面金屬與線材節奏還沒站穩。
    placement:
      - 最好放在標準加工區尾端，方便直接銜接低溫與電漿支線。
      - 可與熔爐、合金熔煉爐放成同一區，統一管理熱製程材料。
  cryo_distiller:
    shape:
      - "GSG"
      - "IPI"
      - "IRI"
    ingredients:
      G: GLASS
      S: tech:steel_plate
      P: POWDER_SNOW_BUCKET
      I: IRON_INGOT
      R: REDSTONE
    tutorial:
      - 低溫蒸餾器代表你正式進入保護層與相變化材料線。
      - 先把農業線、生質線、精煉塔都跑穩，不然冷卻材料會斷供。
      - 低溫核心是後面高熱與終局設備的重要穩定件，不是一次性道具。
    placement:
      - 建議貼近冷卻混合液與精煉油來源，減少長距離搬運。
      - 最好獨立一段儲能，避免高峰時被主工廠搶電停機。
  gene_splicer:
    shape:
      - "SCS"
      - "RBR"
      - "SPS"
    ingredients:
      S: tech:steel_plate
      C: tech:circuit_board
      R: REDSTONE
      B: BREWING_STAND
      P: tech:precision_frame
    tutorial:
      - 基因切片台是農業線升級成真正工業生質線的轉折點。
      - 先補穩作物、生質樹脂、精密電路，再來碰基因樣板。
      - 如果這台常斷料，多半不是機器問題，而是前面的農線與精密線都還太弱。
    placement:
      - 最好放在生質實驗室與精密加工區之間，方便雙線匯流。
      - 後面通常會直接接生質合成槽，形成完整生質工業鏈。
  plasma_refiner:
    shape:
      - "TRT"
      - "QBQ"
      - "TFT"
    ingredients:
      T: tech:titanium_alloy
      R: tech:reactor_core
      Q: tech:quantum_chip
      B: BLAST_FURNACE
      F: tech:field_plate
    tutorial:
      - 電漿精煉爐不是單獨分支，而是把聚變成果往終局材料再壓一層。
      - 先確保聚變核心、離心機、精煉塔與合金線都能穩定量產。
      - 反應爐格架會在時序與巨構支線反覆出現，越早量產越輕鬆。
    placement:
      - 建議與聚變反應爐同區，直接共享高階供能骨幹。
      - 輸出最好接獨立倉儲，避免終局材料跟一般中間件混線。
  observatory:
    shape:
      - "QEQ"
      - "CLC"
      - "QNQ"
    ingredients:
      Q: tech:quantum_chip
      E: tech:etched_circuit
      C: tech:control_unit
      L: LECTERN
      N: tech:nano_coating
    tutorial:
      - 觀測站是資料科技線與終局科技樹的交叉樞紐。
      - 先把光子編織機、量子處理器、重力材料線做穩，再開始跑星圖與資料核心。
      - 後續典藏板、遺產資料、封存核心都會從這條線往上長。
    placement:
      - 建議獨立成觀測資料區，避免與一般裝配線混在一起。
      - 旁邊預留資料封存庫與高階儲能位置，後面擴張會很頻繁。
  survey_beacon:
    shape:
      - "QEQ"
      - "ABA"
      - "QCQ"
    ingredients:
      Q: tech:quantum_chip
      E: tech:etched_circuit
      A: tech:advanced_circuit
      B: BEACON
      C: tech:control_unit
    tutorial:
      - 星球線真正起點不是直接跳上去挖，而是先用觀測站做出掃描晶片。
      - 勘測信標會把星球探索轉成穩定資料流，讓後面的遺跡分析與模組化防護裝有基礎可做。
      - 若資料產量太慢，通常表示你的觀測站、能源或前段光學線還不夠穩。
    placement:
      - 建議放在觀測資料區旁，直接承接觀測站與資料封存庫。
      - 後面通常會接遺跡解析儀與異星精煉機，形成獨立的星球研究支線。
  relic_analyzer:
    shape:
      - "QAQ"
      - "EDE"
      - "QAQ"
    ingredients:
      Q: tech:quantum_chip
      A: tech:advanced_circuit
      E: tech:etched_circuit
      D: CALIBRATED_SCULK_SENSOR
    tutorial:
      - 遺跡解析儀負責把各星球採回來的遺物拆成可用訊號與研究素材。
      - Aurelia、Cryon、Nyx 都能提供不同遺物，這台就是把探索成果轉成工業科技進程的核心。
      - 若想推模組化防護裝，先把這台跑穩，比硬屯礦更重要。
    placement:
      - 建議放在勘測信標後方，形成資料進、遺物進、研究料出的節點。
      - 最好接獨立倉儲，避免高價值遺物被一般材料混走。
  xeno_refinery:
    shape:
      - "QCQ"
      - "ESE"
      - "QCQ"
    ingredients:
      Q: tech:quantum_chip
      C: tech:control_unit
      E: tech:etched_circuit
      S: SMITHING_TABLE
    tutorial:
      - 異星精煉機把各星球的特殊素材轉成可量產的模組材料，是探索線工業化的關鍵。
      - 輻射網層、耐寒內襯、耐壓膜層都要先經過這台處理，不能只靠手工拼裝。
      - 當你開始同時經營多顆星球時，這台會變成穩定供料的瓶頸點。
    placement:
      - 建議與行星鍛造台放成同區，減少中階模組搬運。
      - 周圍預留高吞吐物流，方便同時接入三顆星球的材料支線。
  planetary_forge:
    shape:
      - "QFQ"
      - "CNC"
      - "QFQ"
    ingredients:
      Q: tech:quantum_chip
      F: tech:field_plate
      C: tech:control_unit
      N: NETHERITE_BLOCK
    tutorial:
      - 行星鍛造台負責把通用骨架與專用模組組成真正可用的探索套裝。
      - 抗輻射、防寒、耐壓三種裝備都共用相同骨架，因此這台會成為整條星球裝備鏈的總裝站。
      - 當你拿到 Helion 與 Tempest 的遺跡碎片後，也會在這裡組出更高階的前線全域防護套裝。
      - 建議先推一套抗輻射裝，再依探索目標擴充寒帶、真空與前線版本。
    placement:
      - 最好放在星球研究區尾端，前面接異星精煉機，後面接傳送與補給區。
      - 旁邊可直接擺補給箱與食物線，方便每次出星前整備。
  planetary_gate:
    register-recipe: false
    ingredient-lines:
      - 製作站：星球交通節點
      - 主材料：重力軸承 + 量子框架 + 異星合金
    tutorial:
      - 行星星門是正式版的星球入口，目標不再只靠指令，而是透過基地中的科技站台啟動。
      - 站到星門上右鍵即可啟動躍遷動畫，Shift + 右鍵會切換目標星球；平時維持 12 EU/刻吸能，每次躍遷會再吃掉 1200 EU。
      - 若世界由外部管理器預載，星門會直接接管傳送流程；若沒預載，請先用世界管理插件或完整重啟準備好世界。
    placement:
      - 建議獨立蓋成發射平台，四周留出特效與升空空間。
      - 旁邊放補給箱、防護裝與食物線，讓每次出星前都能完整整備。
  planetary_harvester:
    shape:
      - "QAQ"
      - "COC"
      - "QAQ"
    ingredients:
      Q: tech:quantum_chip
      A: tech:advanced_circuit
      C: tech:control_unit
      O: OBSERVER
    tutorial:
      - 行星採集機專門處理星球表面的特殊樣本，適合把 Aurelia 到 Tempest 的採收轉成半自動外勤據點。
      - 它不會解析遺跡核心，只會收可重複清理的地表資源，因此仍需要你親自處理遺跡互動機關。
      - 若採集效率太差，通常不是機器問題，而是星球前哨的供電與物流還沒跟上。
    placement:
      - 只能放在星球世界中，建議面向樣本最密集的地表或球體邊緣。
      - 最好直接接倉儲、真空入口與補給箱，做成一體式行星前哨。
  void_extractor:
    shape:
      - "NCN"
      - "QMQ"
      - "NFN"
    ingredients:
      N: tech:nano_coating
      C: tech:control_unit
      Q: tech:quantum_chip
      M: CRYING_OBSIDIAN
      F: tech:field_plate
    tutorial:
      - 這是終局物質鏈真正的起點，代表你從量子工業跨進虛空科技。
      - 先把量子流體、晶體培育、能量骨幹做好，不然虛空線只會不停缺料。
      - 暗物質粉與虛空碎片會分別流向奇點、反物質與巨構前置。
    placement:
      - 建議單獨設成終局物質區，避免一般物流混入。
      - 最好直接接終局儲能與高吞吐物流，不然後段很容易塞住。
  graviton_stabilizer:
    shape:
      - "CFC"
      - "RBR"
      - "QNQ"
    ingredients:
      C: tech:crystal_matrix
      F: tech:field_plate
      R: tech:reactor_core
      B: BEACON
      Q: tech:quantum_chip
      N: tech:nano_coating
    tutorial:
      - 重力穩定器是重力子科學的基礎，解鎖後才能煉製重力子透鏡與重力子核心。
      - 先確保場能鍛爐的磁環與培育晶體產線穩住，再推這台。
      - 重力子透鏡之後會流向軌道列印與巨構分支。
    placement:
      - 建議放在終局材料區，與虛空萃取器同層管理。
      - 周圍要留高等儲能與輸出管道空間，重力子核心會流向多條終局線。
  void_beacon:
    shape:
      - "FNF"
      - "QBQ"
      - "RCR"
    ingredients:
      F: tech:fusion_core
      N: tech:nano_coating
      Q: tech:quantum_chip
      B: BEACON
      R: tech:reactor_core
      C: tech:control_unit
    tutorial:
      - 虛空信標是虛空科技線的核心節點，能產出虛空水晶與虛空信標核心。
      - 在推這台之前，先確保虛空萃取器的碎片產量已穩定。
      - 虛空信標核心是高階裝備與巨構鏈的關鍵中間材料。
    placement:
      - 建議放在終局虛空子區域，與時序引擎、軌道列印機同區。
      - 信標核心產出後要分流到武裝與巨構兩條線，物流規劃要預留。
  singularity_press:
    shape:
      - "QFQ"
      - "CVC"
      - "QRQ"
    ingredients:
      Q: tech:quantum_chip
      F: tech:field_plate
      C: tech:control_unit
      V: ANVIL
      R: tech:reactor_core
    tutorial:
      - 奇點壓縮台是從高階材料邁向真正終局結構的分水嶺。
      - 在碰這台之前，請先確保虛空、星核、中子合金線都已經能持續供貨。
      - 奇點核心之後會一路牽動反物質、事件視界、錨定與巔峰鍛造。
    placement:
      - 建議放在終局壓縮區，附近只留高價值材料與終局發電骨幹。
      - 後面最好直接銜接反物質與事件視界線，減少中途倉儲搬運。
  chrono_engine:
    shape:
      - "QRQ"
      - "FCF"
      - "QNQ"
    ingredients:
      Q: tech:quantum_chip
      R: tech:reactor_core
      F: tech:field_plate
      C: CLOCK
      N: tech:nano_coating
    tutorial:
      - 時序引擎是終局多分支中最常被低估的一台，因為它本身就會卡住很多後續線。
      - 先完成軌道列印與虛空穩定化，再把時序線束與時序核心推起來。
      - 時序線成熟後，熵穩定艙、連續體車床與曲率支線才會順。
    placement:
      - 最好與軌道列印機、虛空信標放在同一終局子區域。
      - 周圍務必留高等儲能與範圍模組空間，這台很吃骨幹品質。
  starsteel_foundry:
    shape:
      - "FRF"
      - "QSQ"
      - "FNF"
    ingredients:
      F: tech:field_plate
      R: tech:reactor_core
      Q: tech:quantum_chip
      S: SMITHING_TABLE
      N: tech:nano_coating
    tutorial:
      - 星鋼鑄造廠是巨構階段的第一道正式入口。
      - 若星核、軌道、中子合金三線還不穩，先不要急著硬推巨構。
      - 星鋼材料會一路推向曲率、事件視界、錨定與巔峰核心。
    placement:
      - 建議與真空工藝艙同區，當作巨構材料前場。
      - 這區最好使用獨立高吞吐物流，避免跟一般終局物質鏈互卡。
  apex_forge:
    shape:
      - "QFQ"
      - "RER"
      - "QFQ"
    ingredients:
      Q: tech:quantum_chip
      F: tech:field_plate
      R: tech:reactor_core
      E: ENCHANTING_TABLE
    tutorial:
      - 巔峰鍛成儀不是單一機器，而是整條文明級科技線的總結點。
      - 在做它前，請先確認終局鏈、觀測資料線、巨構材料線都已成熟。
      - 終極矩陣、巔峰核心與終極檔案庫就是這套科技進程的最後展示物。
    placement:
      - 應獨立成最終展示區或文明核心區，不建議塞回一般工廠角落。
      - 周圍可搭配典藏、儲能與主幹節點，作為全園區終點區域。
  purifier:
    shape:
      - "GBG"
      - "CKC"
      - "IRI"
    ingredients:
      G: GLASS
      B: BUCKET
      K: CAULDRON
      C: COPPER_INGOT
      I: IRON_INGOT
      R: REDSTONE
    tutorial:
      - 先準備水桶、玻璃、鍋釜、銅錠、鐵錠與紅石。
      - 先在地上放鐵方塊，再把工作台放在上方形成進階工作台。
      - 用進階工作台照配方擺出淨化器。
      - 放下後右鍵開啟介面，將礦漿淨化為高純度碎片與副產物。
    placement:
      - 建議接在洗礦機後面，形成淨化產線。
      - 淨化後的材料可供給離心機與更高階的機器使用。
  coolant_mixer:
    shape:
      - "ISI"
      - "CKC"
      - "SPS"
    ingredients:
