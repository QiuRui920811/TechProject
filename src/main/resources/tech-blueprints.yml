      G: tech:graviton_core
      S: tech:singularity_casing
      M: RESPAWN_ANCHOR
      C: tech:void_beacon_core
    tutorial:
      - 錨定鍛造台是巨構科技線的核心設備，專門鍛造維度錨與叢集歧管。
      - 需要先完成虛空信標產線來取得虛空信標核心與曲速線圈。
      - 確保持續供應奇點外殼與重力子核心，才能維持穩定產出。
    placement:
      - 建議與虛空信標和奇點壓縮機組成一條完整產線。
      - 此機器耗能極高，務必確保充足的電力來源。
  industrial_centrifuge:
