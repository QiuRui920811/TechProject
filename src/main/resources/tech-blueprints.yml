  # ═══ 迷途星裝備（迷宮套裝） ═══
  maze_blade:
    register-recipe: false
    ingredient-lines:
      - 製作站：行星鍛造台
      - 主材料：守衛者核心×2 + 迷宮遺物×3 + 迷宮碎片×8
    tutorial:
      - 迷途星最強近戰武器，需要擊敗迷宮魔像兩次才能收集足夠的守衛者核心。
      - 右鍵回聲震擊會消耗 12 EU，但扇形擊飛加盲視在牆壁會動的環境裡非常實用。
      - 迷宮碎片和遺物需要反覆進入迷宮深層採集，不要指望一趟刷完。
    placement:
      - 穿戴在主手。需要行動充電器或回迷途星前哨充電。
  echo_crossbow:
    register-recipe: false
    ingredient-lines:
      - 製作站：行星鍛造台
