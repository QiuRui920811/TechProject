# 核心科技內容（原本寫在程式內的預設資料，現在全部外放到 YML）
# 可選外觀欄位：
# item-model: namespace:path（填 -1 或留空 = 不套用）
# nexo-id: your_nexo_item_id
#
# 建議直接填在每個物品 / 機器下面：
#   item-model: techproject:item/your_model
#   nexo-id: your_nexo_item_id
#
# 注意：
# - items: 改科技物品顯示與材質
# - items.icon: 純材料 / 功能型物品優先用不可放置的原版物品，避免再用方塊當底材
# - gui-buttons: 科技書 / 研究台 / 機器 GUI 的功能按鈕外觀
# - gui-icons: 分類卡 / 階級卡 / 研究篩選等動態圖示外觀（主要改 item-model）
# - gui-panes: GUI 玻璃片 / 邊框外觀，item-model 預設 -1 = 不套用
# - machines: 改機器物品顯示與材質
# - recipes: 改配方線
# - achievements: 改成就
