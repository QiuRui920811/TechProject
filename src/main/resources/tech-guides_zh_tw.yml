guides:
  starter_path:
    title: 新手起步：第一條科技生存線
    topic: 開局
    preview: 先學會進階工作台、擺放、接電，再往自動化擴張。
    lines:
      - 第一步先用鐵方塊墊底、上方放工作台做成進階工作台，再做太陽能發電機或燃煤發電機。
      - 第二步把發電機貼著粉碎機放，粉碎機核心上方先加鐵柵欄，原料放進上排後要右鍵鐵柵欄才會真的開始粉碎。
      - 白天用太陽能發電機，夜晚用燃煤發電機；有餘力就把兩台一起放，供電會穩很多。
      - 第三步不要急著衝高階機器，先把壓縮機線養起來：鐵板要再壓成壓實鐵胚，碳纖網也要再壓成高密碳塊。
      - 接著用製造機把壓實鐵胚做成機械零件，再把機械零件和高密碳塊做成精密框架，很多中後期配方都會卡在這裡。
      - 之後再做電鋸與回收機，木材線、回收線補起來之後，中期材料才不會一直斷。
      - 自動農場也是進階工作台起手式，先做它再接溫室培育艙、生質實驗室、作物收割機。
      - 想把發電區和工廠拉開時，開始做電池庫、能源節點、導能線纜。
      - 物流線則用物流節點與物流導管，來源看輸出方向，目標看輸入方向。
      - 戶外機器有環境條件：自動釣台要水、伐木機要自然樹、作物收割機要農地同高度。
      - 生物收集器會略過命名、馴服、拴繩與幼年生物，避免把玩家養的東西直接收走。
      - 採礦鑽機要搭成結構：中心放原版高爐、上方放箱子、同一軸兩側放鐵方塊，鐵方塊上方各放一台採礦鑽機；燃料直接放上方箱子，右鍵中央高爐後才會真的開鑽。
  chapter_01:
    title: 第一章：工業起點
    topic: 開局
    preview: 從手工材料過渡到第一條能源與機器產線。
    lines:
      - 把粉碎機、熔爐、壓縮機、太陽能發電機視為同一條最小工業鏈。
      - 粉碎機現在不是純 GUI 機，核心上方鐵柵欄就是啟動點；有料、有電之後還要親手右鍵啟動。
      - 開局不要急著做所有機器，先讓粉碎、熔煉與儲能形成穩定回圈。
      - 科技書現在會直接把機器的 2D 結構擺在詳情頁下方，缺什麼方塊直接照著擺就好。
      - 若你已經能穩定生產鋼板、壓實鐵胚、高密碳塊與精密框架，就代表中期基礎已完成一半。
      - 機器介面不是裝飾，後期升級、物流與方向都在那裡配置。
  chapter_02:
    title: 第二章：能源骨幹
    topic: 能源
    preview: 認識發電、儲能、節點與導線的分工。
    lines:
      - 太陽能與煤電在前期並用最穩，白天補能、夜晚續航。
      - 電池庫應該放在發電區與耗能區中間，而不是放在角落當裝飾。
      - 能源節點適合跨區橋接，導能線纜適合走廊延伸。
      - 若能量傳不到，多半是方向或搜尋深度不夠，不是機器壞了。
      - 範圍模組很適合骨幹節點附近的核心機器。
      - 到了第四階解鎖聚變反應爐後，它會被動產出 18 EU/tick，同時還能跑聚變配方（淨耗電只有 10/tick），是終局電網的核心升級。
  chapter_03:
    title: 第三章：物流與方向
    topic: 物流
    preview: 完整解釋「方向」設定、物流連接遏輯與常見卡料排除。
    lines:
      - 「輸入方向」跟「輸出方向」是每台機器最重要的設定：輸入方向 = 機器從哪一面接收東西，輸出方向 = 機器往哪一面送出東西。
      - 「全部」表示六個面都行，不限制方向；如果選「北」就只會從北邊隨取/送出。
      - 舉例：粉碎機在西邊、科技熔爐在東邊，想讓粉碎機產出往東送進熔爐 → 粉碎機輸出設「東」，熔爐輸入設「西」。
      - 如果兩台直接相鄰不用節點，最簡單的做法是兩邊都設「全部」。
      - 當產線變長、機器超過兩台時，中間就要放物流節點或物流導管做中繼。
      - 物流只會送目標機器「配方真正需要的」材料，不會亂塞。
      - 過濾路由器第 1 格一定要放樣本，否則它會保持待命，不會亂送任何材料。
      - 方向按鈕現在會顯示四周有哪些機器，左鍵下一個方向、右鍵上一個方向。
      - 卡料時先檢查：① 輸出欄是否已滿、② 方向是否對正、③ 中間有沒有節點中繼、④ 節點的方向蟎設對了沒。
  chapter_04:
    title: 第四章：升級模組
    topic: 升級
    preview: 四種升級模組的定位與常見搭配。
    lines:
      - 速度模組讓單位時間加工輪數變多，但也會更吃材料節奏。
      - 效率模組會壓低耗能，適合高壓製程與終局設備。
      - 堆疊模組讓單次產量變高，原料夠穩定時價值很高。
      - 範圍模組會加強能源與物流網路搜尋深度。
      - 升級槽只有三格，應依瓶頸配置，而不是平均亂插。
  chapter_05:
    title: 第五章：農業與生質線
    topic: 農業
    preview: 從自動農場到生質實驗室的生質工業化。
    lines:
      - 自動農場產出的作物不只是食物，還是化工與冷卻的重要前置。
      - 溫室培育艙可把農業材料推成水凝膠與生長燈。
      - 生質實驗室現在是手動結構機：核心釀造台上方放絆線鉤，右鍵絆線鉤才會啟動培養反應。
      - 化學反應器也是手動結構機：核心信標上方放比較器，右鍵比較器觸發化學鏈式反應。
      - 農業線越早自動化，後面聚合樹脂與冷卻混合液的壓力越小。
      - 農線最好有獨立物流骨幹，避免跟主熔煉區互搶材料。
  chapter_06:
    title: 第六章：回收與塑膠
    topic: 回收
    preview: 回收機在中期材料循環中的真正角色。
    lines:
      - 回收機是塑膠線的底層支柱，不只是清垃圾用。
      - 回收材料與木屑的組合，會在很多配方中持續出現。
      - 若回收線停了，很多看似高階的配方也會連帶缺料。
      - 回收線的節奏比想像中更重要，建議接入穩定儲能。
      - 大工廠要把回收視為資源回流，不是廢料處理。
  chapter_07:
    title: 第七章：電網與節點
    topic: 電網
    preview: 從發電機到耗電機器，電怎麼傳、方向怎麼設、節點怎麼放。
    lines:
      - 電的傳遞和物流一樣看「輸入/輸出方向」：發電機輸出設「全部」或指定面，耗電機器輸入設「全部」或指定面。
      - 最簡單的接電：發電機直接貼著機器放，兩邊都設「全部」，電就會自動傳過去。
      - 想拉遠的話，中間放能源節點或導能線纜做中繼，這就是電網骨幹。
      - 能源節點有自己的輸入/輸出方向：A 節點只收電(輸入指向發電機那側)，B 節點只送電(輸出指向機器那側)。
      - 舉例：太陽能在北、粉碎機在南，中間隔了幾格 → 中間放能源節點，節點輸入設「北」、輸出設「南」。
      - 電池庫放在發電區與耗能區中間，會自動充放電，当緩衝區。
      - 調方向按鈕現在會顯示四周機器，讓你知道「北」是哪台、「南」是哪台。
      - 節點和線纜都是中繼器，管電不管物品；物流節點和導管才是管物品的。兩套骨幹建議分開規劃。
      - 若電傳不到，先檢查：① 方向是否對正、② 中間有沒有節點/線纜、③ 節點自己的方向設對了沒、④ 距離太遠加範圍模組。
  chapter_08:
    title: 第八章：精密加工
    topic: 精密
    preview: 雷射與量子前置的中後期關鍵。
    lines:
      - 雷射雕刻機負責蝕刻電路、控制單元等高密度元件。
      - 沒有穩定光學件與進階電路，量子線會整條卡住。
      - 精密線通常不缺配方，而是缺連續且乾淨的供料。
      - 建議把雷射線與一般裝配線拆開，以免前置件互相阻塞。
      - 這區域很適合優先裝效率模組。
  chapter_09:
    title: 第九章：量子工業
    topic: 量子
    preview: 從量子晶片到場域發射器的完整節奏。
    lines:
      - 量子處理器是中後期的技術門檻，不是單純更快的機器。
      - 通量連結器、相位板、場域發射器都是終局科技重要分支。
      - 若量子線一直斷料，通常是物流骨幹設計不良。
      - 量子區與主工廠分區後，除錯與擴張會容易很多。
      - 量子線很吃穩定供能，電池庫與節點配置要先做好。
  chapter_10:
    title: 第十章：終局物質鏈
    topic: 終局
    preview: 從虛空、重力子、奇點到歐米伽核心的超終局結構。
    lines:
      - 虛空萃取器會把量子流體推向暗物質與虛空碎片。
      - 重力穩定器與奇點壓製機則是終局骨架線的中樞。
      - 反物質、星核、時序、熵變與天穹科技是一層一層堆上去的。
      - 歐米伽核心是整條終局鏈最後的象徵性成果。
      - 這些區域幾乎都該裝效率模組與範圍模組，不然成本極高。
  chapter_11:
    title: 第十一章：遠距網路拓撲
    topic: 網路
    preview: 當工廠從一個房間變成整座園區時該怎麼規劃。
    lines:
      - 主幹線與支線要分清楚，節點應當服務於拓撲，而不是到處亂放。
      - 長距離能源網路建議以能源節點為樞紐，導能線纜為補足。
      - 長距離物流網路則以物流節點為核心，物流導管為延伸。
      - 重要分流點應限制方向，避免資源來回打轉。
      - 若一條線經常搜尋不到目標，先檢查範圍模組是否足夠。
  chapter_12:
    title: 第十二章：配方除錯清單
    topic: 除錯
    preview: 有材料、有電、卻不生產時該檢查的項目。
    lines:
      - 輸入欄材料名稱是否真的對應配方需求。
      - 輸出欄是否有空位或可堆疊空間。
      - 能量是否足夠，且方向設定是否允許接收。
      - 如果機器在遠距網路末端，是否有足夠節點深度可以搜尋到來源。
      - 若裝了速度模組但原料供應跟不上，表面看起來會像卡機。
  chapter_13:
    title: 第十三章：升級配置案例
    topic: 升級
    preview: 不同機器適合什麼升級組合。
    lines:
      - 發電機：通常範圍模組 + 效率模組比速度模組更合理。
      - 量產型材料機：速度模組 + 堆疊模組能帶來可觀收益。
      - 高耗能終局機：效率模組幾乎是必備。
      - 主幹樞紐機：範圍模組會比堆疊模組更有價值。
      - 若你無法判斷，就先找真正瓶頸，而不是盲目疊滿模組。
  chapter_14:
    title: 第十四章：大型工廠分區
    topic: 工廠
    preview: 如何把工業園區切成多個穩定區塊。
    lines:
      - 發電、冶煉、農業、化工、量子、終局最好各自成區。
      - 區域之間用節點骨幹連接，不要所有機器都直接相鄰堆疊。
      - 把中間件集中量產，比每條線自己做一套更好維護。
      - 若某區域常滿輸出，就先擴物流而不是先擴產能。
      - 好的分區設計，能大幅降低你後期改線的痛苦。
  chapter_15:
    title: 第十五章：終局建議流程
    topic: 終局
    preview: 一條比較平滑的終局推進路線。
    lines:
      - 先完成量子線與穩定物流骨幹。
      - 再做虛空 / 重力子前置，確保暗物質與重力材料穩定。
      - 接著做奇點與反物質，建立終局原料庫。
      - 有了星核與軌道前置之後，再進時序、熵變、天穹科技。
      - 歐米伽核心應該是整條工廠成熟之後的產物，而不是硬衝單點。
  chapter_16:
    title: 第十六章：低溫與等離子雙線
    topic: 擴充
    preview: 低溫蒸餾器與電漿精煉機的功能定位。
    lines:
      - 低溫線負責幫終局高熱設備建立穩定保護層與冷卻前置。
      - 電漿線則把聚變成果往更高密度材料推進。
      - 聚變反應爐是混合型機器：放著不跑配方時，它就是一台 18 EU/tick 的高階發電機；塞入聚變材料跑配方時，自身產出的 18 EU 會先抵消需求（28 EU/tick），只需外部補 10 EU/tick。
      - 聚變反應爐推薦接上電池庫與能源節點，讓多餘電力自然流進主電網，同時確保跑配方時有足夠緩衝。
      - 反應爐格架是後面時序與巨構設備很常見的骨架件。
      - 這兩條線都應該接在穩定主幹，而不是臨時支線。
      - 如果同區同時跑高熱與低溫，請先做好方向隔離。
  chapter_17:
    title: 第十七章：觀測資料工業
    topic: 擴充
    preview: 從光子編織機到資料典藏庫的資料科技支線。
    lines:
      - 光子編織機會先產出高級光學件，沒有這一步就做不出完整星圖線。
      - 觀測站會把光學、重力與資料結構混成新的高階中間件。
      - 資料核心與典藏板之後會進一步推成典藏核心。
      - 這條線不是純裝飾，它會直接影響終局巔峰與典藏配方。
      - 觀測線常見瓶頸是控制單元與資料矩陣的供應不穩。
  chapter_18:
    title: 第十八章：巨構工廠終局
    topic: 巨構
    preview: 星鋼、曲率、連續體、巔峰鍛造的巨型工業終點。
    lines:
      - 星鋼鑄造廠與真空艙是進入巨構階段的雙入口。
      - 曲率裝配機會把空間與曲率支線正式接進工廠主體。
      - 事件視界鍛造台與錨定鍛爐則負責奇點外殼與空間錨定。
      - 連續體車床很吃前置骨架件，建議一定要有獨立物流骨幹。
      - 巔峰鍛造爐與歐米伽典藏庫應該被當成最終文明級展示目標。
  chapter_19:
    title: 第十九章：正式推進順序
    topic: 推進流程
    preview: 把整個模組拆成一條比較平滑、不容易卡料的實戰路線。
    lines:
      - 開局先完成發電機 + 粉碎機 + 科技熔爐，接著補電鋸、回收機、自動農場，這是第一段基礎循環。粉碎機與壓縮器也是手動結構機，分別需在上方放鐵柵欄與鐵製壓力板才能操作。
      - 第二段先做壓縮機、製造機、電池庫、能源節點與物流節點，讓中間件開始有真正骨幹。
      - 第三段把合金熔煉爐、洗礦機、淨化器、離心機、生質實驗室、溫室、聚合壓床、化學反應器、拉線機補齊，進入標準加工區；全部八台手動結構機為：碎礦機（鐵柵欄）、壓縮器（鐵製壓力板）、洗礦機（拉桿）、拉線機（鐵柵欄）、淨化器（石頭按鈕）、離心機（金製壓力板）、生質實驗室（絆線鉤）、化學反應器（比較器），都需在核心上方安裝觸發方塊才能操作。
      - 第四段推雷射雕刻機、進階製造機、量子處理器、晶體培育艙、力場鍛造台，正式跨入精密 / 量子工業。
      - 第五段補採礦鑽機、作物收割機、真空入口、倉儲匯流站、過濾路由器、工業總線，讓戶外採集與物流主幹穩定下來；這時你也該補齊工業線束、淨化膜片、離心轉子，否則物流骨幹會明顯偏薄。
      - 第六段再做低溫蒸餾器、基因切片台、電漿精煉爐、觀測站與資料封存庫，補完中後期支線缺口。
      - 第七段開始虛空、奇點、反物質、星核、軌道、時序、熵穩與天穹裝配，這時才算真正進入終局工業。
      - 最後再往星鋼、曲率、連續體、錨定與巔峰鍛造推，這樣整條推進流程會比硬衝單點穩很多。
  chapter_20:
    title: 第二十章：採礦與戶外自動化節奏
    topic: 推進流程
    preview: 採礦鑽機、伐木機、收割機與物流骨幹應該在什麼時候一起成形。
    lines:
      - 採礦鑽機不該太早做，最好等鋼板、鈦合金、機械零件與穩定供電都成熟後再上。
      - 一型採礦鑽機先解決礦石被動供應，二型與三型再視電網與儲運能力升級。
      - 作物收割機、真空入口、倉儲匯流站應該一起規劃，否則只是把掉落物換成新的卡料點。
      - 伐木機與自動釣台都屬於戶外採集線，適合在主工廠之外獨立成區，再用節點接回來。
      - 生物收集器要放在你真的能處理掉落與後端分類的位置，不然它只會把問題集中得更快。
      - 當戶外支線超過三條後，就該升級成過濾路由器、分流節點與工業總線，不要再靠手動補箱子維持。
  chapter_21:
    title: 第二十一章：科技農作物、食物與農務工具
    topic: 農業
    preview: 新的可種植作物會接進收割機、溫室、生質實驗室與外勤補給線。
    lines:
      - 大豆種子由自動農場做出，種在農地上後可以被作物收割機與收田鐮刀一起收成。
      - 香辛莓種子與茶葉苗種由溫室支線推進，代表你的農線已經不只是糧食，而是正式進入工業補給。
      - 大豆莢可做科技營養棒與蛋白口糧包，適合礦區、伐木區、戶外採收線長時間工作。
      - 茶葉可做曙光茶飲，夜間作業與洞窟探索時會很好用。
      - 水培鏟可右鍵快速催熟一片作物，收田鐮刀則能把 3x3 成熟農地直接收掉並重植。
  chapter_22:
    title: 第二十二章：農業線正式接入科技主線
    topic: 推進流程
    preview: 怎麼把新作物從手種農田一路接進機器、自動物流與中後期補給。
    lines:
      - 第一段先做大豆田：自動農場產種、手種擴田、收田鐮刀補人工效率，等有電再上作物收割機。
      - 第二段用溫室把香辛莓與茶葉種子做出來，這時農線就能同時供應食物、茶飲與更多生質材料。
      - 第三段把大豆莢送進生質實驗室與生質合成槽，讓科技營養棒、蛋白口糧包成為你的外勤標準補給。
      - 第四段把收割機、真空入口、倉儲匯流站串起來，整片農場就會變成可長時間自動化運轉的補給基地。
      - 等這條線穩定後，再去做新的探索與星球系統，會比帶著原版麵包硬闖舒服很多。
  chapter_23:
    title: 第二十三章：奧蕾莉亞登陸流程
    topic: 星球
    preview: 第一顆星球現在是完整的三層採樣入口：地表樣本、戰鬥樣本、遺跡樣本。
    lines:
      - 先做完整抗輻射裝，再進奧蕾莉亞；這裡不再只是撿幾個樣本就離開，而是整條星球主線的第一個實戰場。
      - 第一層先採地表：輻照碎晶、虛域花簇與果樹資源能把你送進 Survey Beacon 與前哨補給。
      - 第二層是戰鬥樣本：這顆星球會出現輻塵寄生體，擊倒後能取得輻塵腺體，這是輻射網層的必要材料。
      - 第三層才是遺跡樣本：帶著行星測繪資料回到環形遺跡，啟動核心後才會得到星核遺物與更高階研究資格。
      - 正確節奏是先活下來、再收地表樣本、再處理特殊怪、最後啟動遺跡，不要跳步。
  chapter_24:
    title: 第二十四章：克里昂與倪克斯的中段分岔
    topic: 星球
    preview: 中段推進不再是單一路線，而是寒域與真空兩條平行研究分支。
    lines:
      - 克里昂主打低溫地表樣本與冰脈核心；倪克斯主打真空地表樣本與相位膜組織，兩者分別供應不同模組。
      - 你可以先跑 Cryon 或 Nyx，但最終兩邊都要完成，因為低溫內襯與壓差膜層缺一不可。
      - 克里昂的特殊怪是霜脊潛獵者，掉冰脈核心；倪克斯的虛響觀測者則掉相位膜組織，兩者都是戰鬥樣本層。
      - 霜境遺物與 Nyx 遺核則屬於遺跡層，必須帶著資料回去啟動核心，不能只靠刷怪或採集跳過。
      - 這兩顆星球就是中段學分：學會雙分支補給、雙分支防護與前哨回收，後面才有資格上 Helion / Tempest。
  chapter_25:
    title: 第二十五章：星球三層採樣鏈
    topic: 推進流程
    preview: 星球線現在分成固定三層：地表樣本、戰鬥樣本、遺跡樣本，三層缺一不可。
    lines:
      - 地表樣本層負責開 Survey Beacon 與前哨採收節奏，讓你知道這顆星球值不值得深挖。
      - 戰鬥樣本層由每顆星球的特殊怪提供，這些材料直接綁定防護模組，不打怪就做不出完整環境裝。
      - 遺跡樣本層則由核心同步給出，是 Ancient Signal 與 Frontier Core Fragment 的真正來源。
      - 異星精煉台現在會同時吃地表樣本、戰鬥樣本與遺跡資料，正式把三層結構綁進主推進線。
      - 所以星球不是挖一圈就結束，而是採樣、作戰、解謎、回收四段式循環。
  chapter_26:
    title: 第二十六章：模組化防護裝與戰鬥樣本
    topic: 裝備
    preview: 每套行星裝現在都明確對應一種戰鬥樣本，不再只是把地表掉落物堆進機器。
    lines:
      - 輻射網層需要輻照碎晶與輻塵腺體，低溫內襯需要霜核晶簇與冰脈核心，壓差膜層需要虛璃碎片與相位膜組織。
      - 這代表你不能只在安全區採樣，還必須真正處理星球上的危險生物，裝備升級才會成立。
      - 外骨骼框架與密封織層依然是共通底座，所以量產它們可以降低多星球切裝成本。
      - 行星鍛造台負責把環境防護裝正式標準化，讓每套裝備都有清楚的研究來源與用途。
      - 到了 Helion / Tempest，這套結構會再往前線裝延伸，而不是整條推翻重做。
  chapter_27:
    title: 第二十七章：五星球特殊怪與戰鬥樣本
    topic: 星球
    preview: 每顆星球現在都有自己的特殊怪，戰鬥樣本正式成為推進必修。
    lines:
      - 奧蕾莉亞的輻塵寄生體掉輻塵腺體，克里昂的霜脊潛獵者掉冰脈核心，倪克斯的虛響觀測者掉相位膜組織。
      - 赫利昂的日灼焰獸會給灰燼燃核，坦佩斯特的雷殼追獵者則會掉風暴電容核，兩者直接對應前線模組。
      - 這些怪不等於普通刷怪塔素材，它們是星球現地研究樣本，最好在前哨周圍作戰並立刻回收。
      - 如果你只建採集站不處理特殊怪，會卡在模組層；如果只刷怪不啟動遺跡，則會卡在資料層。
      - 真正成熟的星球前哨應該同時支援採樣、戰鬥、修裝、回收四件事。
  chapter_28:
    title: 第二十八章：星球遺跡互動機關
    topic: 星球
    preview: 遺跡層現在是推進的鎖門器，沒同步核心就拿不到高階訊號與前線碎片。
    lines:
      - Aurelia / Cryon / Nyx 的核心吃行星測繪資料，Helion / Tempest 則提升到古訊號片段，這就是前後段星球的分水嶺。
      - 遺跡核心每座只同步一次，所以每次外勤都要先判斷現在該去採樣、打怪，還是該把資料帶回來解鎖。
      - 高階遺跡會吐出前線核心碎片，這些碎片和高階戰鬥樣本一起組成 Frontier Core。
      - 這一層確保玩家不能只靠機器或單一素材跳關，整個星球系統才會有完整節奏。
      - 最好的做法是把遺跡位置標記在星門基地旁的資料牆，等條件成熟後依序清掉。
  chapter_29:
    title: 第二十九章：行星採集機與前哨自動化
    topic: 自動化
    preview: 自動化現在只接管地表層，戰鬥層與遺跡層仍必須親自完成。
    lines:
      - 行星採集機只負責地表樣本與植物樣本，所以它能穩定補原料，但無法替你收戰鬥樣本與遺跡資料。
      - 這樣設計是故意的：前哨自動化負責維持量產，玩家本人負責突破推進門檻。
      - 理想配置仍然是採集機、真空入口、倉儲匯流站、食物箱與備用裝備櫃，讓你能隨時回前線續航。
      - 多星球經營時，先確保電力與回收骨幹，再擴張採集機，不然常常會變成滿倉停機的空轉站。
      - 你可以把前哨理解成礦點與補給點，不要把它誤會成自動通關點。
  chapter_30:
    title: 第三十章：赫利昂、坦佩斯特與前線套裝
    topic: 星球
    preview: 後段兩顆星球把三層採樣鏈推到最高級，並正式收束成前線套裝。
    lines:
      - Helion 的灰燼燃核與 Tempest 的風暴電容核，正式把戰鬥樣本層延伸到前線裝階段。
      - 兩顆星球的遺跡核心又會再掉前線核心碎片，這些碎片和高階戰鬥樣本一起組成 Frontier Core。
      - 前線套裝不是單一星球裝，而是把前面五顆星球的環境知識全部收束在同一套裝備裡。
      - 所以赫利昂 / 坦佩斯特不只是更危險，而是整條推進線的畢業考：前面哪一層沒補齊，這裡都會卡住。
      - 當前線套裝完成後，多星球往返就會從生存壓力轉成標準化外勤流程。
  chapter_31:
    title: 第三十一章：行星星門與多星球物流
    topic: 星球
    preview: 星門不再只是入口，而是整個推進線的航運骨幹與回收節點。
    lines:
      - 星門現在吃電，所以它天然要求你把能源、裝備櫃、研究機器與補給箱集中成一座真正的發射基地。
      - 同一座星門可以切航線，最適合把 Aurelia / Cryon / Nyx 做成前段航線，Helion / Tempest 做成後段航線。
      - 站台旁最好直接接行星鍛造台、遺物解析儀與倉儲總線，讓樣本回收後能立刻進研究流程。
      - 星門把多星球內容串成一張物流地圖，而不是五個互不相干的觀光點。
      - 如果你把星門當成工業港口來設計，整條星球線的手感會穩定非常多。
  chapter_32:
    title: 第三十二章：五星球總推進
    topic: 推進流程
    preview: 一句話總結整條星球鏈：先奧蕾莉亞開門，中段雙分支，後段雙畢業。
    lines:
      - 第一階段：奧蕾莉亞拿地表樣本、戰鬥樣本、第一個遺跡資料，開 Survey Beacon 與遺物解析儀。
      - 第二階段：Cryon / Nyx 雙分支並行，補齊低溫內襯、壓差膜層與中段遺跡資料。
      - 第三階段：用三顆前段星球成果做出完整中段環境裝、Xeno Alloy 與 Planetary Forge。
      - 第四階段：進 Helion / Tempest 取得高階戰鬥樣本與前線核心碎片。
      - 第五階段：組出 Frontier Core 與 Frontier Suit，正式完成整條五星球探索線。
  android_system_overview:
    title: 自動機 專區：系統總覽
    topic: 自動機
    preview: 自動機 工作站、兩種介面、程序卡與巡邏綁定的完整入口頁。
    lines:
      - 自動機 系統的核心是 自動機 工作站：現在就算不打開 GUI、不放程序晶片，也會依附近真實目標自動判斷要農務、伐木、獵捕還是回收。
      - 自動機 物品介面會連到最近、同主人、半徑內的 自動機 工作站，把工作站產出回收進介面自身或上方容器。
      - 自動機 燃料介面則會在工作站燃料偏低時自動補給，支援煤、精煉油、能源電池、鋰電池、電漿電池與岩漿桶。
      - 自動機 工作站會逐點巡邏，看到成熟作物就收、看到自然樹就砍、看到安全生物就獵捕、看到掉落物就回收。
      - 程序晶片現在變成強制指定模式，不再是唯一操作方式；沒放晶片時就看周遭環境自動工作。
      - 先做 自動機 艙，再做 自動機 工作站，最後補齊物品介面與燃料介面，整套就會像真實巡邏哨站一樣運作。
  android_program_cards:
    title: 自動機 專區：進階程序卡系統
    topic: 自動機
    preview: 基礎程序晶片 + 進階程序卡，決定 自動機 的節奏、成本與掃描能力。
    lines:
      - 基礎程序晶片共有四種：農務程序、伐木程序、回收程序、行星採樣程序，必須放在工作站中間升級槽。
      - 超頻卡會讓程序執行更頻繁，但 EU 與燃料消耗會上升，適合穩定高供電的大型基地。
      - 節能卡會降低能源與燃料成本，適合長時間常駐巡邏線與前哨補給站。
      - 擴域卡會增加巡邏半徑與掃描高度，對伐木、行星採樣與大型農場特別有感。
      - 左右兩格可以混插進階程序卡與一般升級，因此 自動機 不再只是單一功能，而是可調節的自動化單位。
  android_patrol_binding:
    title: 自動機 專區：路徑巡邏與區域綁定 GUI
    topic: 自動機
    preview: 透過工作站 GUI 直接綁定巡邏區域與路線模式。
    lines:
      - 區域半徑按鈕決定 自動機 在工作站周圍要巡邏多大的平面區域，基礎可在 1 到 6 格之間切換。
      - 掃描高度按鈕會決定垂直搜尋範圍，伐木與行星採樣尤其需要拉高這個值。
      - 巡邏路線可切換成蛇形巡邏、螺旋巡邏、環帶巡邏三種，會直接影響 自動機 的逐點掃描順序。
      - 每次改變半徑、高度或路線模式，都會重置巡邏游標，讓 自動機 從新綁定區域的起點重新巡邏。
      - 這套 GUI 綁定方式的目的，是讓 自動機 真正成為可規劃路徑的自動化節點，而不是每 tick 全圖掃描的隱形機器。