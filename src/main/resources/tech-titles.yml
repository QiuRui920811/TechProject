# ═══════════════════════════════════════════════════════════
#  科技稱號系統 — 成就解鎖後可套用的稱號
# ═══════════════════════════════════════════════════════════
#
#  格式：
#    成就ID:
#      title: "顯示的稱號文字（支援 & 色碼與 MiniMessage）"
#
#  佔位符：
#    %techproject_title%        — 玩家目前套用的稱號（無稱號時回傳空字串）
#    %techproject_title_raw%    — 不含色碼的純文字稱號
#    %techproject_title_id%     — 目前套用的成就 ID（無稱號時回傳 none）
#    %techproject_title_count%  — 玩家已解鎖的稱號數量
#    %techproject_title_total%  — 稱號總數
#    %techproject_level%        — 研究等級
#    %techproject_xp%           — 累計研究 XP
#
#  使用方式：
#    1. 在成就 GUI 中點擊已解鎖的成就即可套用稱號
#    2. 再次點擊已套用的稱號可取消
#    3. /tech title — 查看目前稱號
#    4. /tech title clear — 取消稱號
#
#  TAB 插件整合範例：
#    在 TAB/config.yml 的 tablist-name-formatting 或 scoreboard-teams 中使用：
#      prefix: "%techproject_title% "
#
# ═══════════════════════════════════════════════════════════

