# 可選外觀欄位（直接照下面格式填）：
# item-model: namespace:path
#   例：item-model: techproject:item/my_custom_part
# nexo-id: your_nexo_item_id
#   例：nexo-id: custom_machine_part
#
# 建議直接填在每個物品 / 機器下面：
#   item-model: techproject:item/your_model
#   nexo-id: your_nexo_item_id
# items 與 machines 都可用，設定後會優先使用該外觀。
items:
  drill_head:
    display-name: 鑽頭組
    category: INTERMEDIATE
    system-group: FIELD_AUTOMATION
    item-class: CORE_COMPONENT
    visual-tier: TECH
    acquisition-mode: MACHINE_ASSEMBLY
    family: quarry_drill
    role: drill-component
    icon: NETHERITE_PICKAXE
