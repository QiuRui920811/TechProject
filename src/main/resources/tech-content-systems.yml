recipes:
  drill_head_recipe:
    machine: assembler
    inputs: [steel_plate, titanium_alloy]
    input-amounts: [1, 1]
    output: drill_head
    energy: 18
    guide: 鋼板 + 鈦合金 → 製造機 → 鑽頭組
  quarry_frame_recipe:
    machine: assembler
    inputs: [machine_component, alloy_frame]
    input-amounts: [1, 1]
    output: quarry_frame
    energy: 16
    guide: 機械零件 + 合金框架 → 製造機 → 採礦機架
  harvest_matrix_recipe:
    machine: assembler
    inputs: [agri_module, signal_relay]
    input-amounts: [1, 1]
    output: harvest_matrix
    energy: 15
    guide: 農業模組 + 訊號中繼器 → 製造機 → 收割矩陣
  vacuum_core_recipe:
    machine: assembler
    inputs: [signal_relay, pressure_tube]
    input-amounts: [1, 1]
    output: vacuum_core
    energy: 15
    guide: 訊號中繼器 + 壓力導管 → 製造機 → 真空核心
  storm_rotor_recipe:
    machine: wire_mill
    inputs: [steel_wire, magnetic_ring]
    input-amounts: [1, 1]
    output: storm_rotor
    energy: 16
    guide: 鋼線 + 磁環 → 拉線機 → 風暴轉子
  weather_sensor_recipe:
    machine: insulation_press
    inputs: [sensor_array, insulated_wire]
    input-amounts: [1, 1]
    output: weather_sensor
    energy: 15
    guide: 感測陣列 + 絕緣導線 → 絕緣壓床 → 天候感測器
  field_processor_recipe:
    machine: advanced_assembler
    inputs: [control_unit, logic_gate]
    input-amounts: [2, 1]
    output: field_processor
    energy: 22
    guide: 控制單元 + 邏輯閘 → 進階製造機 → 戶外處理器
  quarry_drill_recipe:
    machine: advanced_assembler
    inputs: [drill_head, quarry_frame]
    input-amounts: [2, 1]
    output: quarry_drill
    energy: 24
    guide: 鑽頭組 + 採礦機架 → 進階製造機 → 採礦鑽機
  quarry_drill_mk2_recipe:
    machine: advanced_assembler
    inputs: [quarry_drill, capacitor_bank, control_unit]
    input-amounts: [1, 1, 1]
    output: quarry_drill_mk2
    energy: 38
    guide: 採礦鑽機 + 電容組 + 控制單元 → 進階製造機 → 採礦鑽機二型
  quarry_drill_mk3_recipe:
    machine: quantum_processor
    inputs: [quarry_drill_mk2, fusion_core, quantum_frame]
    input-amounts: [1, 1, 1]
    output: quarry_drill_mk3
    energy: 56
    guide: 採礦鑽機二型 + 聚變核心 + 量子框架 → 量子處理器 → 採礦鑽機三型
  crop_harvester_recipe:
    machine: assembler
    inputs: [harvest_matrix, agri_module]
    input-amounts: [1, 1]
    output: crop_harvester
    energy: 18
    guide: 收割矩陣 + 農業模組 → 製造機 → 作物收割機
  vacuum_inlet_recipe:
    machine: assembler
    inputs: [vacuum_core, machine_casing]
    input-amounts: [1, 1]
