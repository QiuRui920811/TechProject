recipes:
  kiln_ceramic_plate:
    machine: kiln
    inputs: [clay_ball]
    output: ceramic_plate
    energy: 12
    guide: 黏土球 → 窯爐 → 陶瓷板
  kiln_thermal_ceramic:
    machine: kiln
    inputs: [ceramic_plate, heat_coil]
    output: thermal_ceramic
    energy: 14
    guide: 陶瓷板 + 熱線圈 → 窯爐 → 隔熱陶瓷
  insulation_wire_recipe:
    machine: insulation_press
    inputs: [copper_wire, plastic]
    output: insulated_wire
    energy: 11
    guide: 銅線 + 塑膠 → 絕緣壓床 → 絕緣導線
  insulation_sensor_array:
    machine: insulation_press
    inputs: [insulated_wire, logic_gate]
    output: sensor_array
    energy: 13
    guide: 絕緣導線 + 邏輯閘 → 絕緣壓床 → 感測陣列
  insulation_servo_bundle:
    machine: insulation_press
    inputs: [servo_motor, insulated_wire]
    output: servo_bundle
    energy: 13
    guide: 伺服馬達 + 絕緣導線 → 絕緣壓床 → 伺服束線
  cryo_canister_recipe:
    machine: cryo_distiller
    inputs: [coolant_mix, refined_oil]
    output: coolant_canister
    energy: 17
    guide: 冷卻混合液 + 精煉油 → 低溫蒸餾器 → 冷卻罐
  cryo_gel_recipe:
    machine: cryo_distiller
    inputs: [hydro_gel, coolant_cell]
    output: cryo_gel
    energy: 16
    guide: 水凝膠 + 冷卻電池 → 低溫蒸餾器 → 低溫凝膠
  cryo_core_recipe:
    machine: cryo_distiller
    inputs: [coolant_canister, grown_crystal]
    output: cryo_core
    energy: 20
    guide: 冷卻罐 + 培育晶體 → 低溫蒸餾器 → 低溫核心
  gene_bio_catalyst_recipe:
    machine: gene_splicer
    inputs: [bio_resin, fertilizer_mix]
    output: bio_catalyst
    energy: 18
    guide: 生質樹脂 + 肥料混合物 → 基因剪接台 → 生質催化劑
  gene_template_recipe:
    machine: gene_splicer
    inputs: [crops, etched_circuit]
    output: gene_template
    energy: 20
    guide: 作物 + 蝕刻電路 → 基因剪接台 → 基因模板
  gene_neural_resin_recipe:
    machine: gene_splicer
    inputs: [bio_resin, synthetic_fiber]
    output: neural_resin
    energy: 19
    guide: 生質樹脂 + 合成纖維 → 基因剪接台 → 神經樹脂
  gene_splicer_blade_recipe:
    machine: gene_splicer
    inputs: [steel_plate, precision_nozzle]
    output: splicer_blade
    energy: 17
    guide: 鋼板 + 精密噴嘴 → 基因剪接台 → 剪接刀片
  biosynth_meat_recipe:
    machine: biosynth_vat
    inputs: [gene_template, bio_catalyst]
    output: synth_meat
    energy: 16
    guide: 基因模板 + 生質催化劑 → 生物合成槽 → 合成肉
