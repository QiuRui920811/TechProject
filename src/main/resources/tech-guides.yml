guides:
  starter_path:
    title: 新手起步：第一條科技生存線
    topic: 開局
    preview: 先學會進階工作台、擺放、接電，再往自動化擴張。
    lines:
      - 第一步先用鐵方塊墊底、上方放工作台做成進階工作台，再做太陽能發電機或燃煤發電機。
      - 第二步把發電機貼著粉碎機放；粉碎機是手動結構機，放好之後在上方放鐵柵欄，右鍵鐵柵欄就能啟動加工，把鐵礦、銅礦、煤、石英先跑基礎粉碎。
      - 白天用太陽能發電機，夜晚用燃煤發電機；有餘力就把兩台一起放，供電會穩很多。
      - 第三步做電鋸與回收機，木材線、回收線補起來之後，中期材料才不會一直斷。
      - 自動農場也是進階工作台起手式，先做它再接溫室培育艙、生質實驗室、作物收割機。
      - 想把發電區和工廠拉開時，開始做電池庫、能源節點、導能線纜。
      - 物流線則用物流節點與物流導管，來源看輸出方向，目標看輸入方向。
      - 戶外機器有環境條件：自動釣台要水、伐木機要自然樹、作物收割機要農地同高度。
      - 生物收集器會略過命名、馴服、拴繩與幼年生物，避免把玩家養的東西直接收走。
      - 採礦鑽機要搭成結構：中心放原版高爐、上方放箱子、同一軸兩側放鐵方塊，鐵方塊上方各放一台採礦鑽機；燃料直接放上方箱子，右鍵中央高爐後才會真的開鑽。
  chapter_01:
    title: 第一章：工業起點
    topic: 開局
    preview: 從手工材料過渡到第一條能源與機器產線。
    lines:
      - 把粉碎機、熔爐、太陽能發電機視為同一條最小工業鏈。
      - 開局不要急著做所有機器，先讓粉碎、熔煉與儲能形成穩定回圈。
      - 科技書主要用來確認下一個材料該往哪條產線推。
      - 若你已經能穩定生產鋼板，就代表中期基礎已完成一半。
      - 機器介面不是裝飾，後期升級、物流與方向都在那裡配置。
  chapter_02:
    title: 第二章：能源骨幹
    topic: 能源
    preview: 認識發電、儲能、節點與導線的分工。
    lines:
      - 太陽能與煤電在前期並用最穩，白天補能、夜晚續航。
      - 電池庫應該放在發電區與耗能區中間，而不是放在角落當裝飾。
      - 能源節點適合跨區橋接，導能線纜適合走廊延伸。
      - 若能量傳不到，多半是方向或搜尋深度不夠，不是機器壞了。
      - 範圍模組很適合骨幹節點附近的核心機器。
      - 到了第四階解鎖聚變反應爐後，它會被動產出 18 EU/tick，同時還能跑聚變配方（淨耗電只有 10/tick），是終局電網的核心升級。
  chapter_03:
    title: 第三章：物流與方向
    topic: 物流
    preview: 為什麼材料不會自己亂跑，以及怎麼讓它正確地跑。
    lines:
      - 物流只會送目標機器真正需要的材料，不會把雜物亂塞過去。
      - 來源機器看輸出方向，目標機器看輸入方向，兩邊都要對。
      - 物流節點與物流導管能讓物流不只停留在相鄰六面。
      - 若產線很長，優先規劃幹線與支線，不要全都混成一團。
      - 物流卡住時先檢查輸出欄是否已滿，再看方向與節點骨幹。
  chapter_04:
    title: 第四章：升級模組
    topic: 升級
    preview: 四種升級模組的定位與常見搭配。
    lines:
      - 速度模組讓單位時間加工輪數變多，但也會更吃材料節奏。
      - 效率模組會壓低耗能，適合高壓製程與終局設備。
      - 堆疊模組讓單次產量變高，原料夠穩定時價值很高。
      - 範圍模組會加強能源與物流網路搜尋深度。
      - 升級槽只有三格，應依瓶頸配置，而不是平均亂插。
  chapter_05:
    title: 第五章：農業與生質線
    topic: 農業
    preview: 從自動農場到生質實驗室的生質工業化。
    lines:
      - 自動農場產出的作物不只是食物，還是化工與冷卻的重要前置。
      - 溫室培育艙可把農業材料推成水凝膠與生長燈。
      - 生質實驗室會把作物與木屑轉成生質樹脂。
      - 農業線越早自動化，後面聚合樹脂與冷卻混合液的壓力越小。
      - 生質實驗室是手動結構機，需在釀造台上方放絆線鉤，右鍵絆線鉤才能啟動加工。
      - 農線最好有獨立物流骨幹，避免跟主熔煉區互搶材料。
  chapter_06:
    title: 第六章：回收與塑膠
    topic: 回收
    preview: 回收機在中期材料循環中的真正角色。
    lines:
      - 回收機是塑膠線的底層支柱，不只是清垃圾用。
      - 回收材料與木屑的組合，會在很多配方中持續出現。
      - 若回收線停了，很多看似高階的配方也會連帶缺料。
      - 回收線的節奏比想像中更重要，建議接入穩定儲能。
      - 大工廠要把回收視為資源回流，不是廢料處理。
  chapter_07:
    title: 第七章：線材與節點
    topic: 電網
    preview: 拉線機與節點系統的骨幹規劃。
    lines:
      - 銅線、鋼線是零件，導能線纜則是實際能量網路方塊。
      - 物流與能源骨幹建議分開規劃，除錯會輕鬆非常多。
      - 如果主幹太長，優先補範圍模組與節點，不要先亂加機器。
      - 重要的交叉路口要留空間，不然後期很難再重拉主幹。
      - 大型工廠的穩定度，多半取決於節點拓撲而不是單台機器速度。
  chapter_08:
    title: 第八章：精密加工
    topic: 精密
    preview: 雷射與量子前置的中後期關鍵。
    lines:
      - 雷射雕刻機負責蝕刻電路、控制單元等高密度元件。
      - 沒有穩定光學件與進階電路，量子線會整條卡住。
      - 精密線通常不缺配方，而是缺連續且乾淨的供料。
      - 建議把雷射線與一般裝配線拆開，以免前置件互相阻塞。
      - 這區域很適合優先裝效率模組。
  chapter_09:
    title: 第九章：量子工業
    topic: 量子
    preview: 從量子晶片到場域發射器的完整節奏。
    lines:
      - 量子處理器是中後期的技術門檻，不是單純更快的機器。
      - 通量連結器、相位板、場域發射器都是終局科技重要分支。
      - 若量子線一直斷料，通常是物流骨幹設計不良。
      - 量子區與主工廠分區後，除錯與擴張會容易很多。
      - 量子線很吃穩定供能，電池庫與節點配置要先做好。
  chapter_10:
    title: 第十章：終局物質鏈
    topic: 終局
    preview: 從虛空、重力子、奇點到歐米伽核心的超終局結構。
    lines:
      - 虛空萃取器會把量子流體推向暗物質與虛空碎片。
      - 重力穩定器與奇點壓製機則是終局骨架線的中樞。
      - 反物質、星核、時序、熵變與天穹科技是一層一層堆上去的。
      - 歐米伽核心是整條終局鏈最後的象徵性成果。
      - 這些區域幾乎都該裝效率模組與範圍模組，不然成本極高。
  chapter_11:
    title: 第十一章：遠距網路拓撲
    topic: 網路
    preview: 當工廠從一個房間變成整座園區時該怎麼規劃。
    lines:
      - 主幹線與支線要分清楚，節點應當服務於拓撲，而不是到處亂放。
      - 長距離能源網路建議以能源節點為樞紐，導能線纜為補足。
      - 長距離物流網路則以物流節點為核心，物流導管為延伸。
      - 重要分流點應限制方向，避免資源來回打轉。
      - 若一條線經常搜尋不到目標，先檢查範圍模組是否足夠。
  chapter_12:
    title: 第十二章：配方除錯清單
    topic: 除錯
    preview: 有材料、有電、卻不生產時該檢查的項目。
    lines:
      - 輸入欄材料名稱是否真的對應配方需求。
      - 輸出欄是否有空位或可堆疊空間。
      - 能量是否足夠，且方向設定是否允許接收。
      - 如果機器在遠距網路末端，是否有足夠節點深度可以搜尋到來源。
      - 若裝了速度模組但原料供應跟不上，表面看起來會像卡機。
  chapter_13:
    title: 第十三章：升級配置案例
    topic: 升級
    preview: 不同機器適合什麼升級組合。
    lines:
      - 發電機：通常範圍模組 + 效率模組比速度模組更合理。
      - 量產型材料機：速度模組 + 堆疊模組能帶來可觀收益。
      - 高耗能終局機：效率模組幾乎是必備。
      - 主幹樞紐機：範圍模組會比堆疊模組更有價值。
      - 若你無法判斷，就先找真正瓶頸，而不是盲目疊滿模組。
  chapter_14:
    title: 第十四章：大型工廠分區
    topic: 工廠
    preview: 如何把工業園區切成多個穩定區塊。
    lines:
      - 發電、冶煉、農業、化工、量子、終局最好各自成區。
      - 區域之間用節點骨幹連接，不要所有機器都直接相鄰堆疊。
      - 把中間件集中量產，比每條線自己做一套更好維護。
      - 若某區域常滿輸出，就先擴物流而不是先擴產能。
      - 好的分區設計，能大幅降低你後期改線的痛苦。
  chapter_15:
    title: 第十五章：終局建議流程
    topic: 終局
    preview: 一條比較平滑的終局推進路線。
    lines:
      - 先完成量子線與穩定物流骨幹。
      - 再做虛空 / 重力子前置，確保暗物質與重力材料穩定。
      - 接著做奇點與反物質，建立終局原料庫。
      - 有了星核與軌道前置之後，再進時序、熵變、天穹科技。
      - 歐米伽核心應該是整條工廠成熟之後的產物，而不是硬衝單點。
  chapter_16:
    title: 第十六章：低溫與等離子雙線
    topic: 擴充
    preview: 低溫蒸餾器與電漿精煉機的功能定位。
    lines:
      - 低溫線負責幫終局高熱設備建立穩定保護層與冷卻前置。
      - 電漿線則把聚變成果往更高密度材料推進。
      - 聚變反應爐是混合型機器：放著不跑配方時，它就是一台 18 EU/tick 的高階發電機；塞入聚變材料跑配方時，自身產出的 18 EU 會先抵消需求（28 EU/tick），只需外部補 10 EU/tick。
      - 聚變反應爐推薦接上電池庫與能源節點，讓多餘電力自然流進主電網，同時確保跑配方時有足夠緩衝。
      - 反應爐格架是後面時序與巨構設備很常見的骨架件。
      - 這兩條線都應該接在穩定主幹，而不是臨時支線。
      - 如果同區同時跑高熱與低溫，請先做好方向隔離。
  chapter_17:
    title: 第十七章：觀測資料工業
    topic: 擴充
    preview: 從光子編織機到資料典藏庫的資料科技支線。
    lines:
      - 光子編織機會先產出高級光學件，沒有這一步就做不出完整星圖線。
      - 觀測站會把光學、重力與資料結構混成新的高階中間件。
      - 資料核心與典藏板之後會進一步推成典藏核心。
      - 這條線不是純裝飾，它會直接影響終局巔峰與典藏配方。
      - 觀測線常見瓶頸是控制單元與資料矩陣的供應不穩。
  chapter_18:
    title: 第十八章：巨構工廠終局
    topic: 巨構
    preview: 星鋼、曲率、連續體、巔峰鍛造的巨型工業終點。
    lines:
      - 星鋼鑄造廠與真空艙是進入巨構階段的雙入口。
      - 曲率裝配機會把空間與曲率支線正式接進工廠主體。
      - 事件視界鍛造台與錨定鍛爐則負責奇點外殼與空間錨定。
      - 連續體車床很吃前置骨架件，建議一定要有獨立物流骨幹。
      - 巔峰鍛造爐與歐米伽典藏庫應該被當成最終文明級展示目標。
  android_system_overview:
    title: 自動機 專區：系統總覽
    topic: 自動機
    preview: 自動機 工作站、兩種介面、程序卡與巡邏綁定的完整入口頁。
    lines:
      - 自動機 系統的核心是 自動機 工作站：中間程序槽決定任務類型，左右兩格可放進階程序卡或一般升級模組。
      - 自動機 物品介面會連到最近、同主人、半徑內的 自動機 工作站，把工作站產出回收進介面自身或上方容器。
      - 自動機 燃料介面則會在工作站燃料偏低時自動補給，支援煤、精煉油、能源電池、鋰電池、電漿電池與岩漿桶。
      - 自動機 工作站現在不是整區暴力掃描，而是依照 GUI 設定的巡邏半徑、高度與路線模式，逐點巡邏執行任務。
      - 先做 自動機 艙，再做 自動機 工作站，最後補齊物品介面、燃料介面與程序晶片，整套才會完整運作。
  android_program_cards:
    title: 自動機 專區：進階程序卡系統
    topic: 自動機
    preview: 基礎程序晶片 + 進階程序卡，決定 自動機 的節奏、成本與掃描能力。
    lines:
      - 基礎程序晶片共有四種：農務程序、伐木程序、回收程序、行星採樣程序，必須放在工作站中間升級槽。
      - 超頻卡會讓程序執行更頻繁，但 EU 與燃料消耗會上升，適合穩定高供電的大型基地。
      - 節能卡會降低能源與燃料成本，適合長時間常駐巡邏線與前哨補給站。
      - 擴域卡會增加巡邏半徑與掃描高度，對伐木、行星採樣與大型農場特別有感。
      - 左右兩格可以混插進階程序卡與一般升級，因此 自動機 不再只是單一功能，而是可調節的自動化單位。
  android_patrol_binding:
    title: 自動機 專區：路徑巡邏與區域綁定 GUI
    topic: 自動機
    preview: 透過工作站 GUI 直接綁定巡邏區域與路線模式。
    lines:
      - 區域半徑按鈕決定 自動機 在工作站周圍要巡邏多大的平面區域，基礎可在 1 到 6 格之間切換。
      - 掃描高度按鈕會決定垂直搜尋範圍，伐木與行星採樣尤其需要拉高這個值。
      - 巡邏路線可切換成蛇形巡邏、螺旋巡邏、環帶巡邏三種，會直接影響 自動機 的逐點掃描順序。
      - 每次改變半徑、高度或路線模式，都會重置巡邏游標，讓 自動機 從新綁定區域的起點重新巡邏。
      - 這套 GUI 綁定方式的目的，是讓 自動機 真正成為可規劃路徑的自動化節點，而不是每 tick 全圖掃描的隱形機器。
