guides:
  starter_path:
    title: 新手起步：第一條科技生存線
    topic: 開局
    preview: 先學會進階工作台、擺放、接電，再往自動化擴張。
    lines:
      - 第一步先用鐵方塊墊底、上方放工作台做成進階工作台，再做太陽能發電機或燃煤發電機。
      - 第二步把發電機貼著粉碎機放；粉碎機是手動結構機，放好之後在上方放鐵柵欄，右鍵鐵柵欄就能啟動加工，把鐵礦、銅礦、煤、石英先跑基礎粉碎。
      - 白天用太陽能發電機，夜晚用燃煤發電機；有餘力就把兩台一起放，供電會穩很多。
      - 第三步做電鋸與回收機，木材線、回收線補起來之後，中期材料才不會一直斷。
      - 自動農場也是進階工作台起手式，先做它再接溫室培育艙、生質實驗室、作物收割機。
      - 想把發電區和工廠拉開時，開始做電池庫、能源節點、導能線纜。
      - 物流線則用物流節點與物流導管，來源看輸出方向，目標看輸入方向。
      - 戶外機器有環境條件：自動釣台要水、伐木機要自然樹、作物收割機要農地同高度。
      - 生物收集器會略過命名、馴服、拴繩與幼年生物，避免把玩家養的東西直接收走。
      - 採礦鑽機要搭成結構：中心放原版高爐、上方放箱子、同一軸兩側放鐵方塊，鐵方塊上方各放一台採礦鑽機；燃料直接放上方箱子，右鍵中央高爐後才會真的開鑽。
  chapter_01:
    title: 第一章：工業起點
    topic: 開局
    preview: 從手工材料過渡到第一條能源與機器產線。
    lines:
      - 把粉碎機、熔爐、太陽能發電機視為同一條最小工業鏈。
      - 開局不要急著做所有機器，先讓粉碎、熔煉與儲能形成穩定回圈。
      - 科技書主要用來確認下一個材料該往哪條產線推。
      - 若你已經能穩定生產鋼板，就代表中期基礎已完成一半。
      - 科技扳手除了蹲下右鍵拆機器之外，左鍵可以暫停機器、右鍵可以啟動機器，不用每次都打開 GUI。
      - 每台機器 GUI 右下角都有啟停按鈕，綠色染料表示運行中，灰色表示已暫停。
      - 機器介面不是裝飾，後期升級、物流與方向都在那裡配置。
  chapter_02:
    title: 第二章：能源骨幹
    topic: 能源
    preview: 認識發電、儲能、節點與導線的分工。
    lines:
      - 太陽能與煤電在前期並用最穩，白天補能、夜晚續航。
      - 電池庫應該放在發電區與耗能區中間，而不是放在角落當裝飾。
      - 能源節點適合跨區橋接，導能線纜適合走廊延伸。
      - 若能量傳不到，多半是方向或搜尋深度不夠，不是機器壞了。
      - 範圍模組很適合骨幹節點附近的核心機器。
      - 所有加工機器在通電狀態下會持續消耗少量待機電力（約為滿載的 1/4），即使沒有在跑配方也會扣電；電力不足時會顯示「缺少電力」並停止運作。
      - 到了第四階解鎖聚變反應爐後，它會被動產出 18 EU/tick，同時還能跑聚變配方（淨耗電只有 10/tick），是終局電網的核心升級。
  chapter_03:
    title: 第三章：物流與方向
    topic: 物流
    preview: 為什麼材料不會自己亂跑，以及怎麼讓它正確地跑。
    lines:
      - 物流只會送目標機器真正需要的材料，不會把雜物亂塞過去。
      - 採集機器可以直接推到相鄰機器，但加工機器要送給另一台加工機器時，仍需先經過物流節點、物流導管或物流終端。
      - 來源機器看輸出方向，目標機器看輸入方向，兩邊都要對。
      - 物流節點與物流導管能讓物流不只停留在相鄰六面。
      - 若產線很長，優先規劃幹線與支線，不要全都混成一團。
      - 物流卡住時先檢查輸出欄是否已滿，再看方向與節點骨幹。
  chapter_04:
    title: 第四章：升級模組
    topic: 升級
    preview: 四種升級模組的定位與常見搭配。
    lines:
      - 速度模組讓單位時間加工輪數變多，但也會更吃材料節奏。
      - 效率模組會壓低耗能，適合高壓製程與終局設備。
      - 堆疊模組讓單次產量變高，原料夠穩定時價值很高。
      - 範圍模組會加強能源與物流網路搜尋深度。
      - 升級槽只有三格，應依瓶頸配置，而不是平均亂插。
  chapter_05:
    title: 第五章：農業與生質線
    topic: 農業
    preview: 從自動農場到生質實驗室的生質工業化。
    lines:
      - 自動農場產出的作物不只是食物，還是化工與冷卻的重要前置。
      - 溫室培育艙可把農業材料推成水凝膠與生長燈。
      - 生質實驗室會把作物與木屑轉成生質樹脂。
      - 農業線越早自動化，後面聚合樹脂與冷卻混合液的壓力越小。
      - 生質實驗室是手動結構機，需在釀造台上方放絆線鉤，右鍵絆線鉤才能啟動加工。
      - 農線最好有獨立物流骨幹，避免跟主熔煉區互搶材料。
  chapter_06:
    title: 第六章：回收與塑膠
    topic: 回收
    preview: 回收機在中期材料循環中的真正角色。
    lines:
      - 回收機是塑膠線的底層支柱，不只是清垃圾用。
      - 回收材料與木屑的組合，會在很多配方中持續出現。
      - 若回收線停了，很多看似高階的配方也會連帶缺料。
      - 回收線的節奏比想像中更重要，建議接入穩定儲能。
      - 大工廠要把回收視為資源回流，不是廢料處理。
  chapter_07:
    title: 第七章：線材與節點
    topic: 電網
    preview: 拉線機與節點系統的骨幹規劃。
    lines:
      - 銅線、鋼線是零件，導能線纜則是實際能量網路方塊。
      - 物流與能源骨幹建議分開規劃，除錯會輕鬆非常多。
      - 如果主幹太長，優先補範圍模組與節點，不要先亂加機器。
      - 重要的交叉路口要留空間，不然後期很難再重拉主幹。
      - 大型工廠的穩定度，多半取決於節點拓撲而不是單台機器速度。
  chapter_08:
    title: 第八章：精密加工
    topic: 精密
    preview: 雷射與量子前置的中後期關鍵。
    lines:
      - 雷射雕刻機負責蝕刻電路、控制單元等高密度元件。
      - 沒有穩定光學件與進階電路，量子線會整條卡住。
      - 精密線通常不缺配方，而是缺連續且乾淨的供料。
      - 建議把雷射線與一般裝配線拆開，以免前置件互相阻塞。
      - 這區域很適合優先裝效率模組。
  chapter_09:
    title: 第九章：量子工業
    topic: 量子
    preview: 從量子晶片到場域發射器的完整節奏。
    lines:
      - 量子處理器是中後期的技術門檻，不是單純更快的機器。
      - 通量連結器、相位板、場域發射器都是終局科技重要分支。
      - 若量子線一直斷料，通常是物流骨幹設計不良。
      - 量子區與主工廠分區後，除錯與擴張會容易很多。
      - 量子線很吃穩定供能，電池庫與節點配置要先做好。
  chapter_10:
    title: 第十章：終局物質鏈
    topic: 終局
    preview: 從虛空、重力子、奇點到歐米伽核心的超終局結構。
    lines:
      - 虛空萃取器會把量子流體推向暗物質與虛空碎片。
      - 重力穩定器與奇點壓製機則是終局骨架線的中樞。
      - 反物質、星核、時序、熵變與天穹科技是一層一層堆上去的。
      - 歐米伽核心是整條終局鏈最後的象徵性成果。
      - 這些區域幾乎都該裝效率模組與範圍模組，不然成本極高。
  chapter_11:
    title: 第十一章：遠距網路拓撲
    topic: 網路
    preview: 當工廠從一個房間變成整座園區時該怎麼規劃。
    lines:
      - 主幹線與支線要分清楚，節點應當服務於拓撲，而不是到處亂放。
      - 長距離能源網路建議以能源節點為樞紐，導能線纜為補足。
      - 長距離物流網路則以物流節點為核心，物流導管為延伸。
      - 重要分流點應限制方向，避免資源來回打轉。
      - 若一條線經常搜尋不到目標，先檢查範圍模組是否足夠。
  chapter_12:
    title: 第十二章：配方除錯清單
    topic: 除錯
    preview: 有材料、有電、卻不生產時該檢查的項目。
    lines:
      - 機器是否被暫停？檢查 GUI 右下角的啟停按鈕，或用科技扳手右鍵重新開機。
      - 輸入欄材料名稱是否真的對應配方需求。
      - 輸出欄是否有空位或可堆疊空間。
      - 能量是否足夠，且方向設定是否允許接收；待機中也會持續消耗少量電力。
      - 如果機器在遠距網路末端，是否有足夠節點深度可以搜尋到來源。
      - 若裝了速度模組但原料供應跟不上，表面看起來會像卡機。
  chapter_13:
    title: 第十三章：升級配置案例
    topic: 升級
    preview: 不同機器適合什麼升級組合。
    lines:
      - 發電機：通常範圍模組 + 效率模組比速度模組更合理。
      - 量產型材料機：速度模組 + 堆疊模組能帶來可觀收益。
      - 高耗能終局機：效率模組幾乎是必備。
      - 主幹樞紐機：範圍模組會比堆疊模組更有價值。
      - 若你無法判斷，就先找真正瓶頸，而不是盲目疊滿模組。
  chapter_14:
    title: 第十四章：大型工廠分區
    topic: 工廠
    preview: 如何把工業園區切成多個穩定區塊。
    lines:
      - 發電、冶煉、農業、化工、量子、終局最好各自成區。
      - 區域之間用節點骨幹連接，不要所有機器都直接相鄰堆疊。
      - 把中間件集中量產，比每條線自己做一套更好維護。
      - 若某區域常滿輸出，就先擴物流而不是先擴產能。
      - 好的分區設計，能大幅降低你後期改線的痛苦。
  chapter_15:
    title: 第十五章：終局建議流程
    topic: 終局
    preview: 一條比較平滑的終局推進路線。
    lines:
      - 先完成量子線與穩定物流骨幹。
      - 再做虛空 / 重力子前置，確保暗物質與重力材料穩定。
      - 接著做奇點與反物質，建立終局原料庫。
      - 有了星核與軌道前置之後，再進時序、熵變、天穹科技。
      - 歐米伽核心應該是整條工廠成熟之後的產物，而不是硬衝單點。
  chapter_16:
    title: 第十六章：低溫與等離子雙線
    topic: 擴充
    preview: 低溫蒸餾器與電漿精煉機的功能定位。
    lines:
      - 低溫線負責幫終局高熱設備建立穩定保護層與冷卻前置。
      - 電漿線則把聚變成果往更高密度材料推進。
      - 聚變反應爐是混合型機器：放著不跑配方時，它就是一台 18 EU/tick 的高階發電機；塞入聚變材料跑配方時，自身產出的 18 EU 會先抵消需求（28 EU/tick），只需外部補 10 EU/tick。
      - 聚變反應爐推薦接上電池庫與能源節點，讓多餘電力自然流進主電網，同時確保跑配方時有足夠緩衝。
      - 反應爐格架是後面時序與巨構設備很常見的骨架件。
      - 這兩條線都應該接在穩定主幹，而不是臨時支線。
      - 如果同區同時跑高熱與低溫，請先做好方向隔離。
  chapter_17:
    title: 第十七章：觀測資料工業
    topic: 擴充
    preview: 從光子編織機到資料典藏庫的資料科技支線。
    lines:
      - 光子編織機會先產出高級光學件，沒有這一步就做不出完整星圖線。
      - 觀測站會把光學、重力與資料結構混成新的高階中間件。
      - 資料核心與典藏板之後會進一步推成典藏核心。
      - 這條線不是純裝飾，它會直接影響終局巔峰與典藏配方。
      - 觀測線常見瓶頸是控制單元與資料矩陣的供應不穩。
  chapter_18:
    title: 第十八章：巨構工廠終局
    topic: 巨構
    preview: 星鋼、曲率、連續體、巔峰鍛造的巨型工業終點。
    lines:
      - 星鋼鑄造廠與真空艙是進入巨構階段的雙入口。
      - 曲率裝配機會把空間與曲率支線正式接進工廠主體。
      - 事件視界鍛造台與錨定鍛爐則負責奇點外殼與空間錨定。
      - 連續體車床很吃前置骨架件，建議一定要有獨立物流骨幹。
      - 巔峰鍛造爐與歐米伽典藏庫應該被當成最終文明級展示目標。
  android_system_overview:
    title: 自動機 專區：系統總覽
    topic: 自動機
    preview: 自動機 工作站、兩種介面、程序卡與巡邏綁定的完整入口頁。
    lines:
      - 自動機 系統的核心是 自動機 工作站：中間程序槽決定任務類型，左右兩格可放進階程序卡或一般升級模組。
      - 自動機 物品介面會連到最近、同主人、半徑內的 自動機 工作站，把工作站產出回收進介面自身或上方容器。
      - 自動機 燃料介面則會在工作站燃料偏低時自動補給，支援煤、精煉油、能源電池、鋰電池、電漿電池與岩漿桶。
      - 自動機 工作站現在不是整區暴力掃描，而是依照 GUI 設定的巡邏半徑、高度與路線模式，逐點巡邏執行任務。
      - 先做 自動機 艙，再做 自動機 工作站，最後補齊物品介面、燃料介面與程序晶片，整套才會完整運作。
  android_program_cards:
    title: 自動機 專區：進階程序卡系統
    topic: 自動機
    preview: 基礎程序晶片 + 進階程序卡，決定 自動機 的節奏、成本與掃描能力。
    lines:
      - 基礎程序晶片共有四種：農務程序、伐木程序、回收程序、行星採樣程序，必須放在工作站中間升級槽。
      - 超頻卡會讓程序執行更頻繁，但 EU 與燃料消耗會上升，適合穩定高供電的大型基地。
      - 節能卡會降低能源與燃料成本，適合長時間常駐巡邏線與前哨補給站。
      - 擴域卡會增加巡邏半徑與掃描高度，對伐木、行星採樣與大型農場特別有感。
      - 左右兩格可以混插進階程序卡與一般升級，因此 自動機 不再只是單一功能，而是可調節的自動化單位。
  android_patrol_binding:
    title: 自動機 專區：路徑巡邏與區域綁定 GUI
    topic: 自動機
    preview: 透過工作站 GUI 直接綁定巡邏區域與路線模式。
    lines:
      - 區域半徑按鈕決定 自動機 在工作站周圍要巡邏多大的平面區域，基礎可在 1 到 6 格之間切換。
      - 掃描高度按鈕會決定垂直搜尋範圍，伐木與行星採樣尤其需要拉高這個值。
      - 巡邏路線可切換成蛇形巡邏、螺旋巡邏、環帶巡邏三種，會直接影響 自動機 的逐點掃描順序。
      - 每次改變半徑、高度或路線模式，都會重置巡邏游標，讓 自動機 從新綁定區域的起點重新巡邏。
      - 這套 GUI 綁定方式的目的，是讓 自動機 真正成為可規劃路徑的自動化節點，而不是每 tick 全圖掃描的隱形機器。
  update_log_20260407:
    title: 更新日誌 — 2026/04/07
    topic: 更新
    preview: 新機器、能源系統改動、扳手功能擴充與多項修正。
    lines:
      - "【新機器】萬用合成站：聚合所有加工類機器的配方，能耗為原配方的 2 倍，適合中期過渡或臨時生產。合成需要機器外殼、進階電路×2、電路基板×4、鋼板×4。"
      - "【系統】機器待機耗電：所有加工類機器在通電狀態下會持續消耗約 1/4 滿載電力作為待機成本，電力不足會顯示「缺少電力」並停止運作。"
      - "【系統】機器啟停功能：所有機器 GUI 右下角新增啟停按鈕（綠色=運行中、灰色=已暫停）；暫停後不再消耗電力與材料。"
      - "【扳手】科技扳手新增啟停功能：左鍵機器→關機、右鍵機器→開機、蹲下右鍵→拆卸（與原本相同）。"
      - "【扳手】修復扳手拆卸多方塊機器（粉碎機、拉線機等）時，上方的鐵柵欄、壓力板等配件方塊沒被清除的問題。"
      - "【扳手】扳手拆卸冷卻時間 500ms，防止快速連點誤拆其他機器。"
      - "【平衡】熔爐鐵粉/銅粉熔煉配方能耗從 16 降為 8 EU。"
      - "【修正】爆破鎬不再破壞容器類方塊（箱子、漏斗、木桶等），避免內容物消失。"
      - "【格式】材料數量顯示統一為後綴格式：「物品名×N」取代原本的「N× 物品名」。"
  radiation_hazmat_system:
    title: 輻射與 Hazmat 防護衣
    topic: 安全
    preview: 核反應堆與鈾礦脈會產生輻射；四件套 Hazmat 能完全阻擋。
    lines:
      - 核反應堆（Nuclear Reactor）運轉時、以及在 GEO Extractor 抽取中的鈾礦脈旁邊，都會散發輻射。
      - 玩家站在輻射源附近會逐漸累積輻射值，滿了之後會持續扣血並顯示紅色提示。
      - 防輻射套裝總共四件：防輻射頭盔、防輻射胸甲、防輻射護腿、防輻射靴。
      - 只穿部分件數：每件提供 25% 輻射減免；四件齊全則完全免疫輻射傷害。
      - 每次套裝抵擋輻射都會消耗耐久值 1，耐久歸零的部件會失效並卸除。
      - 目前 Hazmat 四件套由管理員指令發放：/tech hazmat <玩家>；未來版本將開放完整合成配方。
      - 處理鈾礦與核反應堆之前，請務必先集齊四件套再上陣。
  geo_resources_system:
    title: 地質資源、掃描儀與抽取機
    topic: 資源
    preview: 每個區塊都藏有確定性的地質資源，需要掃描儀勘探、抽取機開採。
    lines:
      - 世界中每個 chunk 都有一種確定性的地質資源，由世界種子與座標雜湊生成，類型包含原油、鹽礦、鈾礦、銅礦脈、硫磺礦。
      - 使用地質掃描儀（Geo Scanner）右鍵任意方塊，會告訴你當前 chunk 的資源類型、剩餘存量與初始儲量。
      - 掃描過的 chunk 會短暫顯示四角粒子柱，方便在地表判斷邊界。
      - 想要抽取資源時，將 GEO Extractor 放置在該 chunk 範圍內的任意位置，它會持續從 chunk 總量中抽出資源到輸出槽。
      - 鈾礦抽取過程中會產生輻射，請先穿好 Hazmat 四件套。
      - 取得地質掃描儀的快速方式：/tech geo <玩家>。
  ancient_altar_rituals:
    title: 古代祭壇：儀式合成
    topic: 儀式
    preview: 對準祭壇核心右鍵啟動儀式，可合成高階材料。
    lines:
      - 把「古代祭壇」物品當作方塊放下後，核心會是一顆磁石（Lodestone）方塊，具有儀式裝置特效。
      - 把配方需要的物品「丟在祭壇周圍 4 格範圍內的地上」（不是放進容器），然後右鍵祭壇核心即可啟動儀式。
      - 儀式會進行 8 個階段，每階段會噴出不同顏色的粒子，第 7 階段還會召喚閃電，總時長約 8 秒。
      - 內建配方一：紅石方塊×4 + 鑽石×2 + 螢光石×4 → 能源電池×2。
      - 內建配方二：紫水晶碎片×8 + 綠寶石×2 + 終界珍珠×1 → 共鳴寶石×1。
      - 內建配方三：鐵錠×8 + 銅錠×4 + 烈焰粉×2 → 鈦合金×4。
      - 內建配方四：地獄之星×1 + 黑曜石×4 + 終界水晶×1 → 量子框架×1。
  cargo_drawer_logistics:
    title: 量子倉儲抽屜：單一類型大容量
    topic: 物流
    preview: cargo_drawer 綁定單一類型物品，容量 50,000。
    lines:
      - 量子倉儲抽屜（Cargo Drawer）是一種單一類型的大容量倉儲機器，方塊模型為木桶（Barrel）。
      - 在 GUI 的第 1 格（輸入槽 0）放一個樣板物品，抽屜會鎖定這個類型作為它的儲存對象。
      - 之後凡是被放進其他輸入槽的「同類型物品」都會被吸收，儲存量直接累加到內部計數，最高 50,000 件。
      - 輸出槽會自動補滿該物品的整組堆疊（64），方便物流網路的導管、過濾器直接抽取搬走。
      - 與普通倉儲櫃的差別：cargo_drawer 只存一種東西但容量巨大，適合原料囤積站。
  android_custom_dsl:
    title: 自動機 自訂程式 DSL
    topic: 自動機
    preview: 安卓自訂程序（android_custom_script）讓你自己寫指令序列。
    lines:
      - 把「安卓自訂程序」放進自動機工作站的程序晶片槽，工作站就會切換成 CUSTOM 模式，按照你編寫的程式逐條執行。
      - 編輯方式：對準自己擁有的自動機工作站，輸入「/tech android program <動作> ...」。
      - 支援動作：list / add <指令> / set <行> <指令> / remove <行> / clear / help。
      - DSL 指令：MOVE <N|E|S|W|U|D>, HARVEST, CHOP, ATTACK, SALVAGE, WAIT <n>, RESET, JUMP <行>。
      - 程式逐行執行，每 5 tick 一條；最後一行結束後會自動回到第 0 行循環。
      - 範例：MOVE N / HARVEST / MOVE N / HARVEST / JUMP 0 會在工作站前方持續前進收成。
      - 程式會持久化到 plugins/科技專案/android-programs.yml，重啟後保留。
  skill_system_overview:
    title: 技能系統總覽
    topic: 技能
    preview: 6 大技能各有升級方式與屬性加成。
    lines:
      - 本插件提供 6 大技能：戰鬥、探索、採集、工程、研究、共鳴，各有不同的升級途徑。
      - 戰鬥（Combat）：擊殺怪物獲得 XP。提供力量、防禦、爆擊傷害等屬性。
      - 探索（Exploration）：遊歷世界、完成隨機事件獲得 XP。提供速度、爆擊率。
      - 採集（Gathering）：挖礦、砍樹、採集作物獲得 XP。提供幸運、效率、治療強度。
      - 工程（Engineering）：放置機器、機器加工物品獲得 XP。提供最大生命、防禦、效率。
      - 研究（Research）：在研究桌解鎖配方時獲得 XP。提供最大魔力、魔法強度、爆擊率。
      - 共鳴（Resonance）：完成迷宮任務、隨機事件獲得 XP。提供治療強度、魔力回復。
      - 等級上限 50 級。升級需求公式：100 × (等級+1)^1.55，越高級需要越多 XP。
      - 每升一級獲得 1 點天賦點（用於對應天賦樹）。達到 10/20/30/40/50 等里程碑有額外獎勵。
  skill_stat_bonuses:
    title: 技能屬性加成
    topic: 技能
    preview: 每個技能會被動增加特定屬性。
    lines:
      - 技能等級會被動加成 13 種屬性，每種屬性有主要來源與次要來源。
      - 最大生命（基礎 20）：工程 ×0.5 / 級、採集 ×0.3 / 級。
      - 最大魔力（基礎 100）：研究 ×0.6 / 級、共鳴 ×0.4 / 級。
      - 魔力回復（基礎 4.0/s）：共鳴 ×0.5 / 級、研究 ×0.2 / 級。
      - 生命回復（基礎 0.5/s）：採集 ×0.3 / 級、工程 ×0.2 / 級。
      - 力量（基礎 1）：戰鬥 ×0.5 / 級。
      - 防禦（基礎 0）：工程 ×0.4 / 級、戰鬥 ×0.2 / 級。
      - 速度（基礎 0）：探索 ×0.5 / 級。
      - 爆擊率（基礎 5%）：探索 ×0.3% / 級、研究 ×0.2% / 級。
      - 爆擊傷害（基礎 50%）：戰鬥 ×0.3% / 級、共鳴 ×0.2% / 級。
      - 效率（基礎 0）：工程 ×0.4 / 級、採集 ×0.3 / 級。
      - 幸運（基礎 0）：採集 ×0.6 / 級。
      - 魔法強度（基礎 0）：研究 ×0.5 / 級、共鳴 ×0.2 / 級。
      - 治療強度（基礎 0）：共鳴 ×0.5 / 級、採集 ×0.2 / 級。
  talent_tree_overview:
    title: 天賦樹總覽
    topic: 天賦
    preview: 每個技能有一棵 15 節點天賦樹，用天賦點解鎖節點獲得屬性或主動技能。
    lines:
      - 每個技能都有獨立的天賦樹，共 6 棵，每棵 15 個節點，全部 90 個節點。
      - 天賦點來源：技能每升 1 級獲得 1 點對應技能的天賦點。
      - 節點類型：START（免費起點）、MINOR（可多級的小節點）、NOTABLE（一次性中型節點）、KEYSTONE（終極節點，解鎖主動技能）。
      - 天賦樹 GUI 用 /tech talent <技能> 開啟。點擊節點消耗天賦點解鎖。
      - 主動技能（Keystone）解鎖後需手持對應武器，透過右鍵/蹲右組合鍵施放。
  talent_tree_combat:
    title: 天賦樹：戰鬥
    topic: 天賦
    preview: 戰鬥天賦樹 — 持劍者之道，力量與爆擊的極致爆發。
    lines:
      - 起點「戰士之心」：+2 力量（免費）。
      - 小節點：力量鍛鍊（+1 力量/級）、堅韌體魄（+1 防禦/級）、致命本能（+2% 爆擊傷害/級）、狂暴（+1 力量/級）。
      - 中型節點：破甲斬擊（+5 力量、+10% 爆擊傷害）、連擊大師（+10 爆擊傷害、+5% 爆擊率）、地震之力（+8 力量、+5 防禦）、嗜血衝鋒（+5% 爆擊率、+15% 爆擊傷害）。
      - 上層小節點：劍術（+2 力量/級）、戰士之怒（+2% 爆擊傷害/級、+0.5% 爆擊率/級）。
      - 終極技能 ✦ 血怒戰吼：10 秒 +50% 傷害、免疫擊退（右·右·蹲右，60 秒 CD / 60 MP）。
      - 終極技能 ✦ 處決：瞬殺 HP<30% 目標（蹲右·蹲右·右，30 秒 CD / 80 MP）。
      - 終極技能 ✦ 裂地斬：5×5 AoE 跳砸 + 擊飛（右·蹲右·右，12 秒 CD / 40 MP）。
      - 終極技能 ✦ 三連穿刺：3 段突進 + 殘影（蹲右·右·蹲右，18 秒 CD / 50 MP）。
  talent_tree_exploration:
    title: 天賦樹：探索
    topic: 天賦
    preview: 探索天賦樹 — 風的旅人，速度與精準的完美結合。
    lines:
      - 起點「旅人之心」：+2 速度（免費）。
      - 小節點：輕盈步伐（+1 速度/級）、精準射擊（+1% 爆擊率/級）、野外求生（+1 速度/級、+1 生命回復/級）、快速反應（受傷時獲得迅捷）。
      - 中型節點：獵人專注（+5% 爆擊率、+10% 爆擊傷害）、疾風行者（+8 速度）、流星射手（+10% 爆擊率、+5% 爆擊傷害）、疾風之主（+10 速度、+3% 爆擊率）。
      - 上層小節點：遠射專家（+2% 爆擊傷害/級）、風行步（+2 速度/級）。
      - 終極技能 ✦ 獵人之眼：80 格生物顯形 30s（右·右·蹲右，90 秒 CD / 60 MP）。
      - 終極技能 ✦ 影襲：隱身 8s + 下一擊必暴（蹲右·蹲右·右，45 秒 CD / 50 MP）。
      - 終極技能 ✦ 疾風三步：3 段瞬移各 8 格 + 緩降（右·蹲右·右，20 秒 CD / 40 MP）。
      - 終極技能 ✦ 能量鉤索：鉤向視線方塊 30 格（蹲右·右·蹲右，8 秒 CD / 20 MP）。
  talent_tree_gathering:
    title: 天賦樹：採集
    topic: 天賦
    preview: 採集天賦樹 — 大地的使者，幸運與效率的資源專家。
    lines:
      - 起點「工匠之心」：+2 幸運（免費）。
      - 小節點：勤勞之手（+1 幸運/級）、礦工體魄（+2 最大生命/級）、熟練採集（+1 效率/級）、好運護符（+1 幸運/級）。
      - 中型節點：大地祝福（+5 幸運、+8 最大生命）、採集大師（+8 效率、+3 幸運）、礦脈嗅覺（+10 效率、+5 幸運）、豐收之神（+10 幸運、+5 治療強度）。
      - 上層小節點：鑽石之眼（+2 幸運/級）、自然親和（+1 治療強度/級、+1 效率/級）。
      - 終極技能 ✦ 大地裂擊：重鎬轟地製造前方裂縫拋飛敵人（右·右·蹲右，60 秒 CD / 70 MP）。
      - 終極技能 ✦ 大地共鳴：50 格礦脈顯形 60s（蹲右·蹲右·右，60 秒 CD / 40 MP）。
      - 終極技能 ✦ 礦脈連鎖：下一鎬連挖整礦脈（右·蹲右·右，15 秒 CD / 30 MP）。
      - 終極技能 ✦ 地脈震盪：5×5×5 礦物全收（蹲右·右·蹲右，120 秒 CD / 80 MP）。
  talent_tree_engineering:
    title: 天賦樹：工程
    topic: 天賦
    preview: 工程天賦樹 — 鋼鐵工匠，防禦與機械的堅固堡壘。
    lines:
      - 起點「工匠之心」：+2 防禦（免費）。
      - 小節點：鋼鐵意志（+1 防禦/級）、護體裝甲（+2 最大生命/級）、精密製造（+1 效率/級）、電力掌控（+1 防禦/級）。
      - 中型節點：裝甲核心（+8 防禦、+10 最大生命）、機械專精（+10 效率、+5 防禦）、動力源泉（+12 防禦）、奈米裝甲（+15 最大生命、+5 防禦）。
      - 上層小節點：液壓強化（+2 最大生命/級）、熱力管控（+2 防禦/級）。
      - 終極技能 ✦ 磁軌砲：蓄力後發射電磁穿透砲擊（右·右·蹲右，60 秒 CD / 70 MP）。
      - 終極技能 ✦ 電磁脈衝：10 格 AoE 麻痹 5s（蹲右·蹲右·右，60 秒 CD / 50 MP）。
      - 終極技能 ✦ 機械傀儡：召喚 30s 戰鬥機器人（右·蹲右·右，120 秒 CD / 80 MP）。
      - 終極技能 ✦ 過載核心：科技機器 ×3 速 45s（蹲右·右·蹲右，240 秒 CD / 100 MP）。
  talent_tree_research:
    title: 天賦樹：研究
    topic: 天賦
    preview: 研究天賦樹 — 奧秘的學者，魔力與法術的頂尖學院。
    lines:
      - 起點「學者之心」：+20 最大魔力（免費）。
      - 小節點：魔力精通（+10 最大魔力/級）、術法強化（+2 魔法強度/級）、魔能流轉（+1.0 魔力回復/級）、奧義專注（+1% 爆擊率/級）。
      - 中型節點：元素召喚（+8 魔法強度）、秘術專精（+10 魔法強度、+3 魔力回復）、烈焰核心（+15 魔法強度）、冰霜結界（+10 魔法強度、+10 防禦）。
      - 上層小節點：法能回流（+15 最大魔力/級）、奧秘洞察（+2 魔法強度/級）。
      - 終極技能 ✦ 元素裂變：穿透能量束（右·右·蹲右，30 秒 CD / 60 MP）。
      - 終極技能 ✦ 虛空坍縮：製造黑洞吸引敵人後爆炸（蹲右·蹲右·右，90 秒 CD / 80 MP）。
      - 終極技能 ✦ 隕石術：視線召喚隕石（右·蹲右·右，45 秒 CD / 100 MP）。
      - 終極技能 ✦ 時間凍結：15 格敵人凍結 5s（蹲右·右·蹲右，90 秒 CD / 80 MP）。
  talent_tree_resonance:
    title: 天賦樹：共鳴
    topic: 天賦
    preview: 共鳴天賦樹 — 萬物的織者，治療與支援的頂級輔助。
    lines:
      - 起點「共鳴之心」：+2 治療強度（免費）。
      - 小節點：療癒之力（+1 治療強度/級）、魔力充盈（+8 最大魔力/級）、生命回流（+1.0 魔力回復/級）、同頻共振（+1 治療強度/級）。
      - 中型節點：神聖光環（+8 治療強度、+5 魔力回復）、共鳴網絡（+10 治療強度、+5 魔法強度）、慈悲之主（+15 治療強度）、守護真言（+10 治療強度、+8 防禦）。
      - 上層小節點：精神防護（+1 防禦/級、+1 治療強度/級）、靈魂共振（+2 治療強度/級）。
      - 終極技能 ✦ 星爆：聚集星光能量後釋放結晶新星爆炸（右·右·蹲右，90 秒 CD / 90 MP）。
      - 終極技能 ✦ 傳送信標：標記並召集隊友（蹲右·蹲右·右，300 秒 CD / 120 MP）。
      - 終極技能 ✦ 治癒波動：15 格 AoE 回 60% HP（右·蹲右·右，60 秒 CD / 80 MP）。
      - 終極技能 ✦ 共振護盾：50% 吸收護盾 20s（蹲右·右·蹲右，90 秒 CD / 70 MP）。
  multiblock_crafting:
    title: 多方塊結構合成
    topic: 合成
    preview: 用原版方塊疊出結構，右鍵發射器合成 — 不用 GUI、不用電。
    lines:
      - 多方塊結構是早期的手動合成方式，只需要原版方塊和一個發射器。
      - 把材料放進發射器，右鍵發射器即可合成。不需要電力，也不需要開選單。
      - "【研磨石】橡木柵欄放在發射器上方。可合成：鐵粉、銅粉、金粉（由原礦研磨）、碳粉（由煤炭研磨）、硫磺（由地獄石研磨）。"
      - "【合金冶煉爐】地獄磚台階放在發射器上方，旁邊需要有火焰（用打火石點燃）。可合成：青銅錠、鋼錠、焊錫錠、鍍金鐵錠、矽鐵錠。"
      - "【壓力室】平滑石台階放在發射器上方。可合成：鐵板、銅板、鋼板、青銅板、碳板、錫板。"
      - "【護甲鍛造台】鐵砧放在發射器上方。可合成：泰坦護甲套裝、伐木斧、太陽能頭盔。"
      - 多方塊產出量比電力機器少，但零門檻即可使用。建議前期先用多方塊打基礎，有電力後再升級到機器。
      - 結構只要搭好就永久有效，不需要「放置」或「註冊」。拆掉方塊就失效，重新搭就恢復。
  new_tools_overview:
    title: 新工具：伐木斧 / 太陽能頭盔 / 科技背包
    topic: 工具
    preview: 三件提升野外體驗的新裝備。
    lines:
      - "【伐木斧】砍一根原木即可連鎖砍倒整棵樹（最多 128 根），每根消耗 1 點工具耐久。合成方式：護甲鍛造台（鋼錠×3 + 鐵錠×2 + 木棍×2）或場域鍛爐。"
      - "【太陽能頭盔】戴在頭上時，在陽光下每 5 秒自動為背包中的能源工具充入 1 EU。需要露天且白天。合成方式：護甲鍛造台（鐵板×3 + 日照感測器 + 電路板）或場域鍛爐。"
      - "【科技背包】右鍵打開 27 格便攜儲物空間，關閉時自動儲存。物品跟著背包走，背包丟了內容物也在。合成方式：組裝機（機器零件 + 電路板 + 皮革×4）。"
      - 伐木斧適合林業前期、太陽能頭盔適合長時間野外探索、科技背包擴充容量。
  input_filter_system:
    title: 機器輸入過濾
    topic: 物流
    preview: 每台機器都可以設定輸入過濾，限制物流送入的物品種類。
    lines:
      - 機器 GUI 右上角（slot 8）有「輸入過濾」按鈕。
      - 左鍵切換模式：關閉 → 白名單 → 黑名單 → 關閉。
      - 右鍵時手持要過濾的物品，點擊按鈕即可新增/移除過濾項。
      - Shift+右鍵清空過濾清單並關閉。
      - 白名單模式：只接受清單中的物品；黑名單模式：拒絕清單中的物品。
      - 物流/發電機類機器不顯示此按鈕（它們有專用的過濾機制）。
  block_breaker_guide:
    title: 方塊破壞器
    topic: 機器
    preview: 紅石驅動的自動採礦方塊，收到訊號時破壞前方一格。
    lines:
      - "方塊破壞器是唯一不需要電力、純靠紅石驅動的科技機器。"
      - "放置後，投擲器的朝向就是破壞方向。通紅石訊號即自動破壞前方一格方塊。"
      - "掉落物自動存入機器輸出欄，可接物流節點自動搬出。"
      - "不可破壞基岩、屏障、刷怪籠、科技機器等受保護方塊。"
      - "搭配原版時鐘電路 / 觀察者 / 活塞 = 全自動刷石機、自動挖礦。"
      - "合成方式：組裝機（鐵板×2 + 機器零件 + 投擲器）。"
  wind_turbine_guide:
    title: 風力渦輪機
    topic: 發電
    preview: 利用風力持續發電的一階機器，放得越高發電量越大。
    lines:
      - "風力渦輪機是不需要燃料的被動式發電機，只要放置就會持續產電。"
      - "發電量取決於放置高度（Y 座標）："
      - "  Y ≥ 120：12 EU/tick（滿產）"
      - "  Y ≥ 96：8 EU/tick"
      - "  Y ≥ 80：5 EU/tick"
      - "  Y < 80：2 EU/tick（最低）"
      - "下雨或打雷時額外 +4 EU/tick 風暴加成。"
      - "建議放在 Y=120 以上的高空平台，搭配能源節點往下傳電。"
      - "滿產時一台風力渦輪機 = 12 EU/tick，風暴天氣可達 16 EU/tick。"
  storm_turbine_guide:
    title: 風暴渦輪機
    topic: 發電
    preview: 二階天氣發電機，暴風雨時發電量大幅提升。
    lines:
      - "風暴渦輪機是風力渦輪機的進階版本，屬於二階自動化機器。"
      - "晴天時僅產出 2 EU/tick（維持最低運轉）。"
      - "下雨或打雷時產出跳升至 8 EU/tick，並額外向周圍傳輸 6 EU。"
      - "與風力渦輪機不同，風暴渦輪機不受放置高度影響。"
      - "合成需要風暴轉子 + 天候感測器，在進階製造機完成。"
      - "適合搭配其他發電機混合使用：晴天靠太陽能，雨天靠風暴渦輪。"
  compressor_guide:
    title: 壓縮機
    topic: 機器
    preview: 基礎金屬壓縮機，將錠壓成板材和中間素材。
    lines:
      - "壓縮機是基礎等級的加工機器，耗能 8 EU/tick。"
      - "配方一覽（輸入 → 輸出，耗能）："
      - "  鐵錠×2 → 鐵板×1（12 EU）"
      - "  錫錠×1 → 錫板×1（14 EU）"
      - "  鐵板 + 煤粉 → 鋼板×1（14 EU）"
      - "  鐵板 + 鐵板 → 壓實鐵胚×1（18 EU）"
      - "  煤粉×2 → 碳纖網×1（12 EU）"
      - "  碳纖網 + 碳纖網 → 高密碳塊×1（18 EU）"
      - "  銅錠 + 玻璃板 → 壓力導管×1（15 EU）"
      - "  鋼板 + 塑膠 → 複合面板×1（15 EU）"
  industrial_compressor_guide:
    title: 工業壓縮機
    topic: 機器
    preview: 進階壓縮機，批量生產板材且產量加倍。
    lines:
      - "工業壓縮機是進階等級的加工機器，耗能 12 EU/tick。"
      - "相比基礎壓縮機，投入量稍高但產出翻倍。"
      - "配方一覽（輸入 → 輸出，耗能）："
      - "  鐵錠×3 → 鐵板×2（15 EU）"
      - "  銅錠×3 → 銅板×2（15 EU）"
      - "  鋼錠×3 → 鋼板×2（20 EU）"
      - "  青銅錠×3 → 青銅板×2（15 EU）"
      - "  碳粉×9 → 碳板×1（20 EU）"
      - "  碳粉×4 → 碳棒×2（12 EU）"
      - "  鉛錠×8 → 輻射屏蔽板×1（30 EU）"
