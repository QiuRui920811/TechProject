# 可選外觀欄位（直接照下面格式填）：
# item-model: namespace:path
# nexo-id: your_nexo_item_id
#
# 物品範例：
#   some_item:
#     display-name: 某個物品
#     category: ADVANCED
#     icon: IRON_INGOT
#     item-model: techproject:item/some_item
#     nexo-id: some_item
#
# 機器範例：
#   some_machine:
#     display-name: 某台機器
#     category: ADVANCED
#     block: IRON_BLOCK
#     item-model: techproject:item/some_machine
#     nexo-id: some_machine
#
# items 與 machines 都可用，設定後會優先使用該外觀。
