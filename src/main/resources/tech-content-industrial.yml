# ───────────────────────────────────────
#  新機器
# ───────────────────────────────────────
machines:
  # ── Phase 1：基礎工業 ──
  coke_oven:
    display-name: "焦爐"
    category: BASIC
    block: BRICKS
    machine-archetype: PROCESSOR
    inputs: ["coal", "charcoal"]
    outputs: ["coke", "creosote_oil"]
    energy-per-tick: 0
    effect: "無需電力，緩慢碳化"
    unlock: "initial"
  alloy_furnace:
    display-name: "合金爐"
    category: INTERMEDIATE
    block: BLAST_FURNACE
    machine-archetype: PROCESSOR
    inputs: ["copper_ingot", "tin_ingot"]
    outputs: ["bronze_ingot", "solder_ingot", "gilded_iron_ingot", "ferrosilicon_ingot"]
    energy-per-tick: 15
    effect: "雙輸入合金配方"
    unlock: "furnace"
  industrial_washer:
    display-name: "工業洗礦機"
    category: INTERMEDIATE
    block: CAULDRON
    machine-archetype: PROCESSOR
    inputs: ["iron_dust", "copper_dust"]
    outputs: ["purified_iron", "purified_copper"]
    energy-per-tick: 8
    effect: "水洗淨化礦粉"
    unlock: "crusher"
  industrial_centrifuge:
    display-name: "工業離心機"
    category: ADVANCED
    block: IRON_BLOCK
    machine-archetype: PROCESSOR
    inputs: ["purified_iron", "uranium_ore_dust"]
    outputs: ["iron_dust", "enriched_uranium", "chromium_dust", "cobalt_dust"]
    energy-per-tick: 20
    effect: "高速離心分離"
    unlock: "industrial_washer"
  industrial_compressor:
    display-name: "工業壓縮機"
    category: INTERMEDIATE
    block: PISTON
    machine-archetype: PROCESSOR
    inputs: ["iron_ingot", "carbon_dust"]
    outputs: ["iron_plate", "carbon_plate", "carbon_rod"]
    energy-per-tick: 12
    effect: "高壓壓製"
    unlock: "furnace"
  electrolytic_separator:
    display-name: "電解分離機"
    category: ADVANCED
    block: IRON_BLOCK
    machine-archetype: PROCESSOR
    inputs: ["water_bucket", "redstone"]
    outputs: ["hydrogen", "oxygen", "selenium_dust", "silicon"]
    energy-per-tick: 25
    effect: "電解分離元素"
    unlock: "industrial_centrifuge"
  electric_smelter:
    display-name: "電爐"
    category: ADVANCED
    block: FURNACE
    machine-archetype: PROCESSOR
    inputs: ["tungsten_dust", "chromium_dust", "cobalt_dust"]
    outputs: ["tungsten_ingot", "chromium_ingot", "cobalt_ingot"]
    energy-per-tick: 30
    effect: "高溫電弧冶煉"
    unlock: "centrifuge"

  # ── Phase 2：多方塊結構 ──
  blast_furnace:
    display-name: "高爐"
    category: ADVANCED
    block: NETHER_BRICKS
    machine-archetype: PROCESSOR
    inputs: ["iron_ingot", "coke", "carbon_dust"]
    outputs: ["steel_ingot", "tungsten_ingot", "carbide_dust"]
    energy-per-tick: 40
    effect: "3×3×3 磚塊結構，需要溫度 400+ 運作"
    unlock: "coke_oven"
  industrial_smeltery:
    display-name: "工業冶煉爐"
    category: ADVANCED
    block: MAGMA_BLOCK
    machine-archetype: PROCESSOR
    inputs: ["steel_ingot", "damascus_steel_ingot", "tungsten_ingot"]
    outputs: ["damascus_steel_ingot", "hardened_alloy_ingot", "reinforced_alloy_ingot", "conductive_alloy_ingot", "cobalt_chrome_ingot", "molten_iron", "molten_steel", "molten_copper", "molten_gold", "molten_bronze"]
    energy-per-tick: 60
    effect: "十字形多方塊，熔融合金爐，溫度 600+ 運作"
    unlock: "blast_furnace"
  pressure_chamber:
    display-name: "加壓室"
    category: ADVANCED
